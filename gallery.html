<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>부여미협 갤러리 — Buyeo Art Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#b8974a;
  --gold-light:#d4b56a;
  --dark:#0e0e0e;
  --dark2:#1a1a1a;
  --dark3:#2a2a2a;
  --gray:#888;
  --light:#f5f3ef;
  --white:#fff;
  --text:#222;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--light);color:var(--text);min-height:100vh;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#eee;}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px;}

/* HEADER */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(14,14,14,.97);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;height:64px;
  border-bottom:1px solid rgba(184,151,74,.25);
}
.logo{display:flex;align-items:center;gap:14px;text-decoration:none;}
.logo-text{color:var(--white);}
.logo-text .main{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;letter-spacing:2px;color:var(--gold-light);}
.logo-text .sub{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:3px;text-transform:uppercase;}
nav{display:flex;align-items:center;gap:6px;}
nav button{background:none;border:none;color:rgba(255,255,255,.65);font-size:13px;padding:8px 16px;cursor:pointer;border-radius:4px;transition:.2s;font-family:'Noto Sans KR',sans-serif;letter-spacing:.5px;}
nav button:hover{color:var(--white);background:rgba(255,255,255,.08);}
nav button.active{color:var(--gold-light);}
.cart-btn{
  display:flex;align-items:center;gap:6px;
  background:rgba(184,151,74,.15)!important;
  border:1px solid rgba(184,151,74,.4)!important;
  color:var(--gold-light)!important;
  border-radius:20px!important;padding:6px 16px!important;
}
.cart-btn:hover{background:rgba(184,151,74,.25)!important;}
.cart-count{background:var(--gold);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700;}
.mobile-menu-btn{display:none;background:none;border:none;color:#fff;font-size:22px;cursor:pointer;}

/* HERO */
.hero{
  background:var(--dark);
  padding:80px 40px 60px;
  text-align:center;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(184,151,74,.12) 0%,transparent 70%);
}
.hero-label{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold);letter-spacing:6px;text-transform:uppercase;margin-bottom:16px;opacity:.8;}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,5vw,64px);font-weight:300;color:var(--white);line-height:1.15;margin-bottom:16px;letter-spacing:-1px;}
.hero h1 em{font-style:italic;color:var(--gold-light);}
.hero p{color:rgba(255,255,255,.45);font-size:14px;letter-spacing:1px;max-width:500px;margin:0 auto 32px;line-height:1.8;}
.hero-divider{width:60px;height:1px;background:var(--gold);margin:0 auto;}

/* FILTER BAR */
.filter-bar{
  background:var(--white);
  padding:16px 40px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid #e8e0d4;
  flex-wrap:wrap;
  position:sticky;top:64px;z-index:90;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
}
.filter-label{font-size:11px;color:var(--gray);letter-spacing:2px;text-transform:uppercase;margin-right:6px;}
.filter-btn{
  padding:6px 18px;border-radius:20px;border:1.5px solid #e0d8cc;
  background:transparent;font-size:12px;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;transition:.2s;color:#555;letter-spacing:.5px;
}
.filter-btn:hover{border-color:var(--gold);color:var(--gold);}
.filter-btn.active{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:600;}
.filter-count{margin-left:auto;font-size:12px;color:var(--gray);letter-spacing:.5px;}

/* GALLERY GRID */
.gallery-section{padding:40px;}
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:32px;
  max-width:1300px;margin:0 auto;
}
.artwork-card{
  background:var(--white);border-radius:4px;
  overflow:hidden;cursor:pointer;
  box-shadow:0 2px 16px rgba(0,0,0,.07);
  transition:transform .3s,box-shadow .3s;
  animation:fadeUp .5s ease both;
}
.artwork-card:hover{transform:translateY(-6px);box-shadow:0 12px 40px rgba(0,0,0,.14);}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.card-img-wrap{
  position:relative;overflow:hidden;
  background:#f0ece4;
  aspect-ratio:4/3;
}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.artwork-card:hover .card-img-wrap img{transform:scale(1.04);}
.card-placeholder{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:48px;color:#c8bfa8;background:linear-gradient(135deg,#f5f0e8,#ece4d8);
}
.card-badge{
  position:absolute;top:12px;right:12px;
  background:rgba(14,14,14,.75);backdrop-filter:blur(4px);
  color:var(--gold-light);font-size:10px;letter-spacing:1px;
  padding:4px 10px;border-radius:2px;font-weight:600;
}
.card-badge.sold{background:rgba(180,60,60,.8);color:#fff;}
.card-badge.nfs{background:rgba(80,80,80,.8);color:#ccc;}
.card-info{padding:18px 20px 20px;}
.card-title{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px;letter-spacing:-.3px;}
.card-artist{font-size:12px;color:var(--gray);margin-bottom:8px;letter-spacing:.3px;}
.card-meta{display:flex;justify-content:space-between;align-items:center;}
.card-size{font-size:11px;color:#aaa;letter-spacing:.5px;}
.card-price{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--gold);}
.card-price.nfs{font-size:12px;color:#aaa;font-family:'Noto Sans KR',sans-serif;}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:20px;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{
  background:var(--white);border-radius:4px;
  width:100%;max-width:900px;max-height:92vh;
  overflow-y:auto;display:flex;flex-direction:column;
  animation:slideUp .3s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.modal-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 28px;border-bottom:1px solid #e8e0d4;
  background:var(--dark);
}
.modal-header-title{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold);letter-spacing:4px;text-transform:uppercase;}
.modal-close{background:none;border:none;color:rgba(255,255,255,.5);font-size:22px;cursor:pointer;transition:.2s;line-height:1;}
.modal-close:hover{color:#fff;}
.modal-body{display:grid;grid-template-columns:1.2fr 1fr;gap:0;}
.modal-img{background:#f0ece4;display:flex;align-items:center;justify-content:center;min-height:400px;overflow:hidden;}
.modal-img img{width:100%;height:100%;object-fit:contain;max-height:500px;}
.modal-img-placeholder{font-size:80px;color:#c8bfa8;}
.modal-detail{padding:36px 32px;display:flex;flex-direction:column;border-left:1px solid #e8e0d4;}
.modal-title{font-family:'Noto Serif KR',serif;font-size:26px;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.3;}
.modal-artist{font-size:14px;color:var(--gold);letter-spacing:1px;margin-bottom:24px;font-weight:500;}
.modal-specs{margin-bottom:24px;}
.spec-row{display:flex;gap:0;margin-bottom:8px;border-bottom:1px solid #f0ece4;padding-bottom:8px;}
.spec-label{font-size:11px;color:#aaa;letter-spacing:2px;text-transform:uppercase;width:80px;flex-shrink:0;padding-top:2px;}
.spec-value{font-size:13px;color:#444;line-height:1.6;}
.modal-divider{height:1px;background:#e8e0d4;margin:20px 0;}
.modal-price-area{margin-bottom:28px;}
.price-label{font-size:11px;color:#aaa;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.price-value{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;color:var(--gold);line-height:1;}
.price-value.nfs{font-size:16px;color:#888;font-family:'Noto Sans KR',sans-serif;}
.modal-actions{display:flex;flex-direction:column;gap:10px;margin-top:auto;}
.btn-cart{
  padding:14px;border-radius:3px;border:none;cursor:pointer;
  font-size:14px;font-weight:600;font-family:'Noto Sans KR',sans-serif;
  letter-spacing:.5px;transition:.2s;
  background:var(--gold);color:#fff;
}
.btn-cart:hover{background:#a07a30;}
.btn-cart:disabled{background:#ccc;cursor:default;}
.btn-inquiry{
  padding:14px;border-radius:3px;
  border:1.5px solid var(--gold);
  background:transparent;color:var(--gold);
  font-size:13px;cursor:pointer;font-weight:500;
  font-family:'Noto Sans KR',sans-serif;letter-spacing:.5px;transition:.2s;
  text-decoration:none;display:block;text-align:center;
}
.btn-inquiry:hover{background:rgba(184,151,74,.08);}
.btn-added{background:#27ae60!important;}

/* CART PAGE */
.cart-page{max-width:900px;margin:0 auto;padding:48px 40px;}
.cart-title{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;color:var(--text);margin-bottom:8px;}
.cart-subtitle{font-size:13px;color:var(--gray);margin-bottom:40px;letter-spacing:.5px;}
.cart-empty{text-align:center;padding:80px 0;color:var(--gray);}
.cart-empty .icon{font-size:64px;margin-bottom:16px;opacity:.4;}
.cart-item{
  display:flex;gap:20px;padding:24px 0;
  border-bottom:1px solid #e8e0d4;align-items:center;
}
.cart-item-img{width:90px;height:70px;object-fit:cover;border-radius:2px;background:#f0ece4;flex-shrink:0;}
.cart-item-img-placeholder{width:90px;height:70px;background:#f0ece4;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#c8bfa8;flex-shrink:0;}
.cart-item-info{flex:1;}
.cart-item-title{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:600;margin-bottom:4px;}
.cart-item-artist{font-size:12px;color:var(--gray);}
.cart-item-price{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--gold);margin-right:16px;}
.cart-item-remove{background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;transition:.2s;}
.cart-item-remove:hover{color:#e74c3c;}
.cart-summary{margin-top:32px;padding:28px;background:var(--dark);border-radius:4px;color:#fff;}
.summary-row{display:flex;justify-content:space-between;margin-bottom:12px;font-size:14px;}
.summary-total{display:flex;justify-content:space-between;font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--gold-light);margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.1);}
.btn-checkout{
  width:100%;margin-top:20px;padding:18px;
  background:var(--gold);color:#fff;border:none;border-radius:3px;
  font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;
  font-family:'Noto Sans KR',sans-serif;transition:.2s;
}
.btn-checkout:hover{background:#a07a30;}
.inquiry-box{margin-top:20px;background:#f8f5ef;border-radius:4px;padding:20px;text-align:center;border:1px solid #e8e0d4;}
.inquiry-box p{font-size:13px;color:#666;margin-bottom:12px;line-height:1.8;}
.inquiry-phone{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--gold);display:block;margin-bottom:4px;}
.inquiry-name{font-size:12px;color:#999;}

/* ABOUT */
.about-page{max-width:800px;margin:0 auto;padding:60px 40px;}
.about-title{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:300;margin-bottom:8px;}
.about-sub{font-size:13px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:48px;}
.about-section{margin-bottom:48px;}
.about-section h3{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:600;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #e8e0d4;letter-spacing:-.3px;}
.about-section p{font-size:14px;color:#555;line-height:2;margin-bottom:12px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;}
.info-item{background:#f8f5ef;padding:20px;border-radius:4px;border-left:3px solid var(--gold);}
.info-item .label{font-size:11px;color:var(--gray);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.info-item .value{font-size:14px;color:var(--text);font-weight:500;line-height:1.6;}

/* ADMIN */
.admin-section{max-width:900px;margin:0 auto;padding:48px 40px;}
.admin-form{background:#fff;border-radius:4px;padding:32px;box-shadow:0 2px 16px rgba(0,0,0,.07);margin-bottom:32px;}
.admin-form h3{font-family:'Noto Serif KR',serif;font-size:18px;margin-bottom:24px;color:var(--text);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
.form-group label{font-size:11px;color:var(--gray);letter-spacing:2px;text-transform:uppercase;}
.form-group input,.form-group select,.form-group textarea{
  border:1.5px solid #e0d8cc;border-radius:3px;
  padding:10px 12px;font-size:14px;
  font-family:'Noto Sans KR',sans-serif;
  background:#fafafa;transition:.2s;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold);outline:none;background:#fff;}
.form-group textarea{min-height:80px;resize:vertical;}
.btn-submit{
  margin-top:20px;padding:12px 32px;
  background:var(--gold);color:#fff;border:none;border-radius:3px;
  font-size:14px;font-weight:600;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;transition:.2s;
}
.btn-submit:hover{background:#a07a30;}
.admin-list{background:#fff;border-radius:4px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.07);}
.admin-list-item{display:flex;align-items:center;gap:16px;padding:16px 20px;border-bottom:1px solid #f0ece4;}
.admin-list-item img{width:60px;height:48px;object-fit:cover;border-radius:2px;}
.admin-list-title{flex:1;font-size:14px;font-weight:500;}
.admin-list-artist{font-size:12px;color:var(--gray);}
.btn-del{background:#fde8e8;color:#c0392b;border:none;border-radius:3px;padding:5px 10px;cursor:pointer;font-size:12px;}

/* FOOTER */
footer{background:var(--dark2);color:rgba(255,255,255,.4);text-align:center;padding:32px 40px;font-size:12px;letter-spacing:.5px;border-top:1px solid rgba(184,151,74,.15);}
footer strong{color:var(--gold-light);display:block;font-family:'Cormorant Garamond',serif;font-size:16px;margin-bottom:8px;}

/* MOBILE */
@media(max-width:768px){
  header{padding:0 20px;}
  nav:not(.mobile-nav){display:none;}
  .mobile-menu-btn{display:block;}
  .mobile-nav{position:fixed;top:64px;left:0;right:0;background:var(--dark2);z-index:99;flex-direction:column;gap:0;padding:8px 0;}
  .mobile-nav button{width:100%;text-align:left;padding:14px 24px;border-radius:0;font-size:15px;}
  .hero{padding:48px 20px 40px;}
  .filter-bar{padding:12px 20px;}
  .gallery-section{padding:24px 20px;}
  .gallery-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;}
  .modal{border-radius:0;max-height:100vh;}
  .modal-body{grid-template-columns:1fr;grid-template-rows:auto 1fr;}
  .modal-detail{padding:24px 20px;border-left:none;border-top:1px solid #e8e0d4;}
  .cart-page,.about-page,.admin-section{padding:32px 20px;}
  .info-grid{grid-template-columns:1fr;}
  .form-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<header>
  <a class="logo" href="#" onclick="navigate('home');return false;">
    <div class="logo-text">
      <div class="main">부여미협 갤러리</div>
      <div class="sub">Buyeo Art Gallery</div>
    </div>
  </a>
  <nav id="main-nav">
    <button onclick="navigate('home')" class="active" data-page="home">갤러리</button>
    <button onclick="navigate('about')" data-page="about">협회소개</button>
    <button onclick="navigate('admin')" data-page="admin" id="admin-nav-btn" style="display:none">작품관리</button>
    <button onclick="navigate('cart')" class="cart-btn" data-page="cart">
      🛒 장바구니 <span class="cart-count" id="cart-count">0</span>
    </button>
  </nav>
  <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
</header>
<nav id="mobile-nav" style="display:none" class="mobile-nav">
  <button onclick="navigate('home');closeMobileMenu()">갤러리</button>
  <button onclick="navigate('about');closeMobileMenu()">협회소개</button>
  <button onclick="navigate('admin');closeMobileMenu()" id="admin-mobile-btn" style="display:none">작품관리</button>
  <button onclick="navigate('cart');closeMobileMenu()">🛒 장바구니 (<span id="cart-count2">0</span>)</button>
</nav>

<div id="app"></div>

<footer>
  <strong>한국미술협회 부여지부 갤러리</strong>
  충남 부여군 수북로 14-16 &nbsp;|&nbsp; 판매문의: 010-5400-3144 (사무장)<br/>
  © 2025 Buyeo Art Gallery. All rights reserved.
</footer>

<script>
// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let artworks = JSON.parse(localStorage.getItem('gallery_artworks')||'[]');
let cart = JSON.parse(localStorage.getItem('gallery_cart')||'[]');
let currentPage = 'home';
let currentFilter = 'all';
let selectedArtwork = null;
let isAdmin = sessionStorage.getItem('gallery_admin')==='1';
let mobileMenuOpen = false;

// 샘플 데이터 (처음 로드시)
if(artworks.length===0){
  artworks = [
    {id:1,title:'고요한 아침',artist:'민경희',year:'2024',size:'60×80cm',medium:'유화',price:850000,forSale:true,category:'유화',imgUrl:'',desc:'부여의 고요한 아침을 담은 작품입니다.'},
    {id:2,title:'백마강의 노을',artist:'홍정희',year:'2024',size:'80×100cm',medium:'아크릴',price:1200000,forSale:true,category:'아크릴',imgUrl:'',desc:''},
    {id:3,title:'연꽃의 향기',artist:'이란순',year:'2023',size:'50×50cm',medium:'수채화',price:0,forSale:false,category:'수채화',imgUrl:'',desc:'비매품 작품입니다.'},
    {id:4,title:'부여의 봄',artist:'장현정',year:'2024',size:'100×80cm',medium:'유화',price:1500000,forSale:true,category:'유화',imgUrl:'',desc:''},
    {id:5,title:'궁남지 풍경',artist:'송현호',year:'2023',size:'72×90cm',medium:'수채화',price:680000,forSale:true,category:'수채화',imgUrl:'',desc:''},
    {id:6,title:'가을 산하',artist:'황경남',year:'2024',size:'45×60cm',medium:'유화',price:920000,forSale:true,category:'유화',imgUrl:'',desc:''},
  ];
  localStorage.setItem('gallery_artworks',JSON.stringify(artworks));
}

function saveArtworks(){localStorage.setItem('gallery_artworks',JSON.stringify(artworks));}
function saveCart(){localStorage.setItem('gallery_cart',JSON.stringify(cart));updateCartCount();}
function updateCartCount(){
  document.getElementById('cart-count').textContent=cart.length;
  document.getElementById('cart-count2').textContent=cart.length;
}
function navigate(page){
  currentPage=page;
  document.querySelectorAll('[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function toggleMobileMenu(){
  mobileMenuOpen=!mobileMenuOpen;
  document.getElementById('mobile-nav').style.display=mobileMenuOpen?'flex':'none';
}
function closeMobileMenu(){mobileMenuOpen=false;document.getElementById('mobile-nav').style.display='none';}
function setAdminMode(val){
  isAdmin=val;sessionStorage.setItem('gallery_admin',val?'1':'');
  document.getElementById('admin-nav-btn').style.display=val?'':'none';
  document.getElementById('admin-mobile-btn').style.display=val?'':'none';
  render();
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render(){
  const app = document.getElementById('app');
  if(currentPage==='home') app.innerHTML = renderHome();
  else if(currentPage==='cart') app.innerHTML = renderCart();
  else if(currentPage==='about') app.innerHTML = renderAbout();
  else if(currentPage==='admin') app.innerHTML = renderAdmin();
  updateCartCount();
}

// ─── HOME ───
function renderHome(){
  const categories = ['all',...new Set(artworks.map(a=>a.category).filter(Boolean))];
  const filtered = currentFilter==='all'?artworks:artworks.filter(a=>a.category===currentFilter);
  const sorted = [...filtered].sort((a,b)=>b.id-a.id);

  const cards = sorted.map((a,i)=>`
    <div class="artwork-card" onclick="openArtwork(${a.id})" style="animation-delay:${i*0.05}s">
      <div class="card-img-wrap">
        ${a.imgUrl?`<img src="${a.imgUrl}" alt="${a.title}" loading="lazy"/>`:`<div class="card-placeholder">🖼️</div>`}
        <div class="card-badge ${!a.forSale?'nfs':''}">${a.forSale?'판매중':'비매품'}</div>
      </div>
      <div class="card-info">
        <div class="card-title">${a.title}</div>
        <div class="card-artist">${a.artist} · ${a.year}</div>
        <div class="card-meta">
          <span class="card-size">${a.size}</span>
          ${a.forSale?`<span class="card-price">${a.price.toLocaleString()}원</span>`:`<span class="card-price nfs">비매품</span>`}
        </div>
      </div>
    </div>
  `).join('');

  return `
    <div class="hero">
      <div class="hero-label">한국미술협회 부여지부</div>
      <h1>예술이 머무는 곳,<br/><em>부여미협 갤러리</em></h1>
      <p>부여의 예술가들이 담아낸 아름다운 세계를 만나보세요</p>
      <div class="hero-divider"></div>
    </div>
    <div class="filter-bar">
      <span class="filter-label">분류</span>
      ${categories.map(c=>`<button class="filter-btn ${currentFilter===c?'active':''}" onclick="setFilter('${c}')">${c==='all'?'전체':c}</button>`).join('')}
      <span class="filter-count">${sorted.length}점</span>
      ${!isAdmin?`<button style="margin-left:8px;background:none;border:1.5px solid #ddd;border-radius:20px;padding:5px 14px;font-size:11px;cursor:pointer;color:#999;" onclick="promptAdmin()">관리자</button>`:`<button style="margin-left:8px;background:none;border:1.5px solid #e74c3c;border-radius:20px;padding:5px 14px;font-size:11px;cursor:pointer;color:#e74c3c;" onclick="setAdminMode(false)">관리자 로그아웃</button>`}
    </div>
    <div class="gallery-section">
      ${sorted.length===0?'<div style="text-align:center;padding:80px;color:#aaa;font-size:15px;">등록된 작품이 없습니다</div>':`<div class="gallery-grid">${cards}</div>`}
    </div>
    ${renderModal()}
  `;
}

function setFilter(f){currentFilter=f;render();}

function renderModal(){
  if(!selectedArtwork) return '';
  const a=selectedArtwork;
  const inCart=cart.some(c=>c.id===a.id);
  return `
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <span class="modal-header-title">Artwork Detail</span>
          <button class="modal-close" onclick="closeArtwork()">✕</button>
        </div>
        <div class="modal-body">
          <div class="modal-img">
            ${a.imgUrl?`<img src="${a.imgUrl}" alt="${a.title}"/>`:`<div class="modal-img-placeholder">🖼️</div>`}
          </div>
          <div class="modal-detail">
            <div>
              <div class="modal-title">${a.title}</div>
              <div class="modal-artist">${a.artist}</div>
              <div class="modal-specs">
                ${[['연도',a.year],['크기',a.size],['재료',a.medium||'-'],['분류',a.category||'-']].map(([l,v])=>`
                  <div class="spec-row"><span class="spec-label">${l}</span><span class="spec-value">${v}</span></div>
                `).join('')}
                ${a.desc?`<div style="margin-top:12px;font-size:13px;color:#666;line-height:1.8;">${a.desc}</div>`:''}
              </div>
            </div>
            <div class="modal-divider"></div>
            <div class="modal-price-area">
              <div class="price-label">가격</div>
              ${a.forSale?`<div class="price-value">${a.price.toLocaleString()}<span style="font-size:18px;font-weight:400;color:#888;margin-left:4px">원</span></div>`:`<div class="price-value nfs">비매품 작품입니다</div>`}
            </div>
            <div class="modal-actions">
              ${a.forSale?`
                <button class="btn-cart ${inCart?'btn-added':''}" onclick="toggleCart(${a.id})" ${inCart?'':''}>${inCart?'✓ 장바구니에 담김':'장바구니에 담기'}</button>
              `:''}
              <a href="tel:010-5400-3144" class="btn-inquiry">📞 구매 문의하기</a>
              <div style="font-size:11px;color:#aaa;text-align:center;letter-spacing:.5px;">010-5400-3144 · 한국미술협회 부여지부 사무장</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function openArtwork(id){selectedArtwork=artworks.find(a=>a.id===id);render();}
function closeArtwork(){selectedArtwork=null;render();}
function closeModal(e){if(e.target.classList.contains('modal-overlay')){selectedArtwork=null;render();}}
function toggleCart(id){
  const a=artworks.find(x=>x.id===id);if(!a||!a.forSale)return;
  const idx=cart.findIndex(c=>c.id===id);
  if(idx>=0)cart.splice(idx,1);else cart.push({id:a.id,title:a.title,artist:a.artist,price:a.price,imgUrl:a.imgUrl});
  saveCart();
  selectedArtwork=a;render();
}

// ─── CART ───
function renderCart(){
  if(cart.length===0) return `
    <div class="cart-page">
      <div class="cart-title">장바구니</div>
      <div class="cart-empty"><div class="icon">🛒</div><div>담긴 작품이 없습니다</div><br/><button onclick="navigate('home')" style="background:var(--gold);color:#fff;border:none;border-radius:3px;padding:12px 28px;cursor:pointer;font-size:14px;font-family:'Noto Sans KR',sans-serif;">갤러리 둘러보기</button></div>
    </div>`;
  const total=cart.reduce((s,c)=>s+c.price,0);
  return `
    <div class="cart-page">
      <div class="cart-title">장바구니</div>
      <div class="cart-subtitle">${cart.length}점의 작품이 담겨 있습니다</div>
      ${cart.map(c=>`
        <div class="cart-item">
          ${c.imgUrl?`<img class="cart-item-img" src="${c.imgUrl}" alt="${c.title}"/>`:`<div class="cart-item-img-placeholder">🖼️</div>`}
          <div class="cart-item-info">
            <div class="cart-item-title">${c.title}</div>
            <div class="cart-item-artist">${c.artist}</div>
          </div>
          <span class="cart-item-price">${c.price.toLocaleString()}원</span>
          <button class="cart-item-remove" onclick="removeCart(${c.id})" title="제거">✕</button>
        </div>
      `).join('')}
      <div class="cart-summary">
        <div class="summary-row"><span>작품 수</span><span>${cart.length}점</span></div>
        <div class="summary-total"><span>합계</span><span>${total.toLocaleString()}원</span></div>
      </div>
      <div class="inquiry-box">
        <p>결제는 사무장에게 직접 문의해 주세요.<br/>작품 배송 및 픽업 방법도 안내해 드립니다.</p>
        <a href="tel:010-5400-3144" class="inquiry-phone">📞 010-5400-3144</a>
        <div class="inquiry-name">한국미술협회 부여지부 사무장</div>
      </div>
      <button class="btn-checkout" onclick="clearCart()">🗑️ 장바구니 비우기</button>
    </div>`;
}
function removeCart(id){cart=cart.filter(c=>c.id!==id);saveCart();render();}
function clearCart(){if(confirm('장바구니를 비울까요?')){cart=[];saveCart();render();}}

// ─── ABOUT ───
function renderAbout(){return `
  <div class="about-page">
    <div class="about-title">협회 소개</div>
    <div class="about-sub">About Us</div>
    <div class="about-section">
      <h3>한국미술협회 부여지부</h3>
      <p>한국미술협회 부여지부는 충청남도 부여 지역의 미술 발전과 회원들의 창작 활동 지원을 위해 설립된 단체입니다.</p>
      <p>지역 예술인들의 작품을 알리고, 예술 문화 저변 확대를 위해 전시회, 강습회 등 다양한 활동을 펼치고 있습니다.</p>
    </div>
    <div class="about-section">
      <h3>갤러리 안내</h3>
      <p>본 갤러리는 부여지부 회원들의 작품을 온라인으로 전시하고 판매하는 공간입니다. 작품 구매 문의는 아래 연락처로 문의 바랍니다.</p>
      <div class="info-grid">
        <div class="info-item"><div class="label">주소</div><div class="value">충남 부여군 수북로 14-16</div></div>
        <div class="info-item"><div class="label">판매 문의</div><div class="value">010-5400-3144<br/>한국미술협회 부여지부 사무장</div></div>
        <div class="info-item"><div class="label">운영</div><div class="value">한국미술협회 부여지부</div></div>
        <div class="info-item"><div class="label">전시 작품</div><div class="value">${artworks.length}점 전시 중</div></div>
      </div>
    </div>
  </div>`;}

// ─── ADMIN ───
function promptAdmin(){
  const pw=prompt('관리자 비밀번호를 입력하세요:');
  if(pw==='art3144'){setAdminMode(true);navigate('admin');}
  else if(pw!==null)alert('비밀번호가 틀렸습니다.');
}
function renderAdmin(){
  if(!isAdmin) return `<div style="text-align:center;padding:80px;color:#aaa;"><div style="font-size:48px;margin-bottom:16px;">🔒</div><div>관리자만 접근 가능합니다.</div></div>`;
  return `
    <div class="admin-section">
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;margin-bottom:32px;">작품 관리</h2>
      <div class="admin-form">
        <h3>➕ 작품 등록</h3>
        <div class="form-grid">
          <div class="form-group"><label>작품명 *</label><input id="f-title" placeholder="작품명"/></div>
          <div class="form-group"><label>작가명 *</label><input id="f-artist" placeholder="작가명"/></div>
          <div class="form-group"><label>제작연도</label><input id="f-year" placeholder="2024"/></div>
          <div class="form-group"><label>크기</label><input id="f-size" placeholder="60×80cm"/></div>
          <div class="form-group"><label>재료</label><input id="f-medium" placeholder="유화, 수채화..."/></div>
          <div class="form-group"><label>분류</label><input id="f-category" placeholder="유화, 수채화, 한국화..."/></div>
          <div class="form-group"><label>판매여부</label><select id="f-forsale"><option value="1">판매중</option><option value="0">비매품</option></select></div>
          <div class="form-group"><label>가격 (원)</label><input id="f-price" type="number" placeholder="500000"/></div>
          <div class="form-group full"><label>작품 설명</label><textarea id="f-desc" placeholder="작품에 대한 설명을 입력하세요"></textarea></div>
          <div class="form-group full">
            <label>작품 사진</label>
            <input type="file" accept="image/*" id="f-img" onchange="previewImg(event)"/>
            <img id="f-preview" style="display:none;max-height:200px;margin-top:8px;border-radius:4px;object-fit:contain;"/>
          </div>
        </div>
        <button class="btn-submit" onclick="addArtwork()">작품 등록하기</button>
      </div>
      <div class="admin-form">
        <h3>📋 등록된 작품 목록 (${artworks.length}점)</h3>
        <div class="admin-list">
          ${artworks.length===0?'<div style="padding:40px;text-align:center;color:#aaa;">등록된 작품이 없습니다</div>':
            artworks.map(a=>`
              <div class="admin-list-item">
                ${a.imgUrl?`<img src="${a.imgUrl}" alt="${a.title}"/>`:`<div style="width:60px;height:48px;background:#f0ece4;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#c8bfa8;">🖼️</div>`}
                <div class="admin-list-title">${a.title}<br/><span class="admin-list-artist">${a.artist} · ${a.year} · ${a.forSale?a.price.toLocaleString()+'원':'비매품'}</span></div>
                <button class="btn-del" onclick="deleteArtwork(${a.id})">삭제</button>
              </div>
            `).join('')}
        </div>
      </div>
    </div>`;
}
function previewImg(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{const img=new Image();img.onload=()=>{const mw=1400,mh=1000,ratio=Math.min(mw/img.width,mh/img.height,1);const w=Math.round(img.width*ratio),h=Math.round(img.height*ratio);const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);const url=c.toDataURL('image/jpeg',0.88);document.getElementById('f-preview').src=url;document.getElementById('f-preview').style.display='block';};img.src=ev.target.result;};
  r.readAsDataURL(f);
}
function addArtwork(){
  const title=document.getElementById('f-title').value.trim();
  const artist=document.getElementById('f-artist').value.trim();
  if(!title||!artist){alert('작품명과 작가명은 필수입니다.');return;}
  const imgEl=document.getElementById('f-preview');
  const artwork={
    id:Date.now(),title,artist,
    year:document.getElementById('f-year').value||new Date().getFullYear().toString(),
    size:document.getElementById('f-size').value,
    medium:document.getElementById('f-medium').value,
    category:document.getElementById('f-category').value||'기타',
    forSale:document.getElementById('f-forsale').value==='1',
    price:parseInt(document.getElementById('f-price').value)||0,
    desc:document.getElementById('f-desc').value,
    imgUrl:imgEl.style.display!=='none'?imgEl.src:'',
  };
  artworks.unshift(artwork);saveArtworks();
  alert('작품이 등록되었습니다!');render();
}
function deleteArtwork(id){
  if(confirm('이 작품을 삭제할까요?')){
    artworks=artworks.filter(a=>a.id!==id);
    cart=cart.filter(c=>c.id!==id);
    saveArtworks();saveCart();render();
  }
}

// INIT
updateCartCount();
if(isAdmin){document.getElementById('admin-nav-btn').style.display='';document.getElementById('admin-mobile-btn').style.display='';}
render();
</script>
</body>
