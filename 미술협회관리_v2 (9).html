            {years.length===0&&<span style={{fontSize:13,color:"#ccc"}}>내역이 없습니다</span>}
          </div>

          {/* 월별 요약 + 상세 */}
          <div style={{background:"#fff",borderRadius:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)",overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:"#f8f9fa",borderBottom:"2px solid #e8e8e8"}}>
                {["월","수입","지출","순수입","건수",""].map((h,i)=>(
                  <th key={i} style={{padding:"10px 14px",textAlign:i>=1&&i<=4?"right":"left",color:"#666",fontWeight:600}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {monthlySummary.length===0&&<tr><td colSpan={6} style={{textAlign:"center",padding:30,color:"#ccc"}}>해당 연도의 거래 내역이 없습니다</td></tr>}
                {monthlySummary.map((m,i)=>(
                  <React.Fragment key={m.month}>
                    {/* 월 요약 행 */}
                    <tr style={{borderBottom:"1px solid #f0f0f0",background:expandedMonth===m.month?"#eef5ff":i%2?"#fafafa":"#fff",cursor:"pointer"}}
                      onClick={()=>setExpandedMonth(expandedMonth===m.month?null:m.month)}>
                      <td style={{padding:"11px 14px",fontWeight:700,color:"#2d6a9f"}}>
                        {expandedMonth===m.month?"▼":"▶"} {m.label}
                      </td>
                      <td style={{padding:"11px 14px",textAlign:"right",color:"#27ae60",fontWeight:600}}>{m.income>0?m.income.toLocaleString():"-"}</td>
                      <td style={{padding:"11px 14px",textAlign:"right",color:"#e74c3c",fontWeight:600}}>{m.expense>0?m.expense.toLocaleString():"-"}</td>
                      <td style={{padding:"11px 14px",textAlign:"right",fontWeight:700,color:m.net>=0?"#2d6a9f":"#e74c3c"}}>
                        {m.net>=0?"+":""}{m.net.toLocaleString()}
                      </td>
                      <td style={{padding:"11px 14px",textAlign:"right",color:"#888"}}>{m.count}건</td>
                      <td style={{padding:"11px 14px",fontSize:11,color:"#aaa",textAlign:"right"}}>{expandedMonth===m.month?"접기":"펼치기"}</td>
                    </tr>
                    {/* 월 상세 내역 */}
                    {expandedMonth===m.month&&(
                      <>
                        {m.txs.map((t)=>{
                          const isEdit=editId===t.id;
                          return(
                            <tr key={t.id} style={{background:isEdit?"#f0f7ff":"#f5f9ff",borderBottom:"1px solid #e8f0fb"}}>
                              <td style={{padding:"7px 14px 7px 30px",color:"#888",fontSize:12,whiteSpace:"nowrap"}}>
                                {isEdit
                                  ?<input type="date" value={editForm.date} onChange={e=>setEditForm({...editForm,date:e.target.value})}
                                      style={{border:"1px solid #2d6a9f",borderRadius:4,padding:"2px 5px",fontSize:11,width:120}}/>
                                  :t.date}
                              </td>
                              <td style={{padding:"7px 14px",fontSize:12}}>
                                {isEdit
                                  ?<input value={editForm.desc} onChange={e=>setEditForm({...editForm,desc:e.target.value})}
                                      style={{border:"1px solid #2d6a9f",borderRadius:4,padding:"2px 5px",fontSize:11,width:"100%",minWidth:140,boxSizing:"border-box"}}/>
                                  :t.desc}
                              </td>
                              <td style={{padding:"7px 14px",fontSize:12}}>
                                {isEdit
                                  ?<select value={editForm.type} onChange={e=>setEditForm({...editForm,type:e.target.value})}
                                      style={{border:"1px solid #2d6a9f",borderRadius:4,padding:"2px 4px",fontSize:11}}>
                                      <option value="income">수입</option><option value="expense">지출</option></select>
                                  :<span style={{background:t.type==="income"?"#e8f5e9":"#fde8e8",color:t.type==="income"?"#27ae60":"#e74c3c",padding:"1px 7px",borderRadius:20,fontSize:10,fontWeight:600}}>{t.type==="income"?"수입":"지출"}</span>}
                              </td>
                              <td style={{padding:"7px 14px",textAlign:"right",color:t.type==="income"?"#27ae60":"#e74c3c",fontWeight:600,fontSize:12}}>
                                {isEdit
                                  ?<input type="number" value={Math.abs(parseInt(editForm.amount)||0)} onChange={e=>setEditForm({...editForm,amount:e.target.value})}
                                      style={{width:90,border:"1px solid #2d6a9f",borderRadius:4,padding:"2px 5px",textAlign:"right",fontSize:11}}/>
                                  :<>{t.type==="income"?"+":"-"}{Math.abs(t.amount||0).toLocaleString()}</>}
                              </td>
                              <td style={{padding:"7px 14px",textAlign:"right",fontSize:12,color:"#888"}}>{(t.balance||0).toLocaleString()}</td>
                              <td style={{padding:"7px 10px",whiteSpace:"nowrap"}}>
                                {isAdmin&&(isEdit
                                  ?<><button onClick={()=>{saveEdit();}} style={{background:"#27ae60",color:"#fff",border:"none",borderRadius:4,padding:"2px 8px",cursor:"pointer",fontSize:10,fontWeight:600,marginRight:3}}>저장</button>
                                     <button onClick={()=>setEditId(null)} style={{background:"#f0f0f0",border:"none",borderRadius:4,padding:"2px 7px",cursor:"pointer",fontSize:10}}>취소</button></>
                                  :<><button onClick={e=>{e.stopPropagation();setEditId(t.id);setEditForm({date:t.date,desc:t.desc,amount:Math.abs(t.amount),type:t.type});}}
                                      style={{background:"#e8f0fe",color:"#2d6a9f",border:"none",borderRadius:4,padding:"2px 7px",cursor:"pointer",fontSize:10,marginRight:3}}>수정</button>
                                     <button onClick={e=>{e.stopPropagation();deleteTx(t.id);}} style={{background:"#fde8e8",color:"#c0392b",border:"none",borderRadius:4,padding:"2px 7px",cursor:"pointer",fontSize:10}}>삭제</button></>
                                )}
                              </td>
                            </tr>
                          );
                        })}
                        {/* 월 소계 */}
                        <tr style={{background:"#e8eef7",borderBottom:"2px solid #c8d4e8"}}>
                          <td colSpan={2} style={{padding:"7px 14px 7px 30px",fontSize:12,fontWeight:700,color:"#2d6a9f"}}>{m.label} 소계</td>
                          <td style={{padding:"7px 14px",fontSize:12}}></td>
                          <td style={{padding:"7px 14px",textAlign:"right",fontSize:12,fontWeight:700,color:m.net>=0?"#2d6a9f":"#e74c3c"}}>
                            {m.net>=0?"+":""}{m.net.toLocaleString()}
                          </td>
                          <td style={{padding:"7px 14px",textAlign:"right",fontSize:12,color:"#888"}}>{m.count}건</td>
                          <td></td>
                        </tr>
                      </>
                    )}
                  </React.Fragment>
                ))}
                {/* 연간 합계 */}
                {monthlySummary.length>0&&(
                  <tr style={{background:"#dce5f3",borderTop:"2px solid #b0c0da",fontWeight:700}}>
                    <td style={{padding:"12px 14px",color:"#1a3a5c"}}>{(selectedYear||years[0])}년 합계</td>
                    <td style={{padding:"12px 14px",textAlign:"right",color:"#27ae60"}}>{monthlySummary.reduce((s,m)=>s+m.income,0).toLocaleString()}</td>
                    <td style={{padding:"12px 14px",textAlign:"right",color:"#e74c3c"}}>{monthlySummary.reduce((s,m)=>s+m.expense,0).toLocaleString()}</td>
                    <td style={{padding:"12px 14px",textAlign:"right",color:"#1a3a5c"}}>{monthlySummary.reduce((s,m)=>s+m.net,0).toLocaleString()}</td>
                    <td style={{padding:"12px 14px",textAlign:"right",color:"#888"}}>{monthlySummary.reduce((s,m)=>s+m.count,0)}건</td>
                    <td></td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ── 회의록 ──
function MeetingsPage({meetings,setMeetings,members,isAdmin}) {
  const [showForm,setShowForm]=useState(false);
  const [selected,setSelected]=useState(null);
  const [form,setForm]=useState({type:"임원회의",date:"",venue:"",attendCount:0,attendees:[],content:""});

  const saveMeeting=()=>{
    if(!form.date||!form.content)return;
    const data={...form,attendCount:form.attendees.length||form.attendCount};
    if(selected!==null){setMeetings(meetings.map(m=>m.id===selected?{...data,id:selected}:m));setSelected(null);}
    else setMeetings([...meetings,{...data,id:Date.now()}]);
    setForm({type:"임원회의",date:"",venue:"",attendCount:0,attendees:[],content:""});setShowForm(false);
  };
  const toggleAttendee=name=>{
    const list=form.attendees.includes(name)?form.attendees.filter(n=>n!==name):[...form.attendees,name];
    setForm({...form,attendees:list,attendCount:list.length});
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{margin:0,fontSize:18,fontWeight:700}}>📋 총회 · 임원회의 관리</h2>
        {isAdmin&&<button onClick={()=>{setSelected(null);setForm({type:"임원회의",date:"",venue:"",attendCount:0,attendees:[],content:""});setShowForm(true);}} style={{background:"#2d6a9f",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontSize:13,fontWeight:600}}>+ 회의 기록</button>}
      </div>
      {showForm&&(
        <div style={{background:"#fff",borderRadius:10,padding:20,marginBottom:16,boxShadow:"0 2px 10px rgba(0,0,0,.1)",border:"2px solid #8e44ad"}}>
          <div style={{fontWeight:700,marginBottom:14,color:"#8e44ad",fontSize:15}}>{selected?"회의 수정":"새 회의 기록"}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
            <div><label style={{fontSize:11,color:"#888"}}>회의 종류</label>
              <select value={form.type} onChange={e=>setForm({...form,type:e.target.value})} style={{width:"100%",border:"1px solid #e0e0e0",borderRadius:6,padding:"7px 10px",fontSize:13}}>
                {["정기총회","임시총회","임원회의","분과회의","기타"].map(t=><option key={t}>{t}</option>)}</select></div>
            <div><label style={{fontSize:11,color:"#888"}}>날짜</label>
              <input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} style={{width:"100%",border:"1px solid #e0e0e0",borderRadius:6,padding:"7px 10px",fontSize:13,boxSizing:"border-box"}}/></div>
            <div><label style={{fontSize:11,color:"#888"}}>장소</label>
              <input value={form.venue} onChange={e=>setForm({...form,venue:e.target.value})} style={{width:"100%",border:"1px solid #e0e0e0",borderRadius:6,padding:"7px 10px",fontSize:13,boxSizing:"border-box"}}/></div>
          </div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:11,color:"#888"}}>참석자 선택 ({form.attendees.length}명)</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:6,maxHeight:120,overflow:"auto",border:"1px solid #e0e0e0",borderRadius:8,padding:10}}>
              {members.filter(m=>m.name).map(m=>(
                <button key={m.id} onClick={()=>toggleAttendee(m.name)}
                  style={{border:form.attendees.includes(m.name)?"2px solid #8e44ad":"1px solid #e0e0e0",background:form.attendees.includes(m.name)?"#f3e8ff":"#f8f8f8",borderRadius:20,padding:"3px 10px",cursor:"pointer",fontSize:12,color:form.attendees.includes(m.name)?"#8e44ad":"#555",fontWeight:form.attendees.includes(m.name)?600:400}}>
                  {m.name}
                </button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:12}}><label style={{fontSize:11,color:"#888"}}>회의 내용</label>
            <textarea value={form.content} onChange={e=>setForm({...form,content:e.target.value})} rows={5} style={{width:"100%",border:"1px solid #e0e0e0",borderRadius:6,padding:"8px 10px",fontSize:13,resize:"vertical",boxSizing:"border-box"}}/></div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={saveMeeting} style={{background:"#8e44ad",color:"#fff",border:"none",borderRadius:7,padding:"8px 20px",cursor:"pointer",fontWeight:600}}>저장</button>
            <button onClick={()=>{setShowForm(false);setSelected(null);}} style={{background:"#f0f0f0",border:"none",borderRadius:7,padding:"8px 16px",cursor:"pointer"}}>취소</button>
          </div>
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {[...meetings].reverse().map(m=>(
          <div key={m.id} style={{background:"#fff",borderRadius:10,padding:18,boxShadow:"0 1px 4px rgba(0,0,0,.06)",borderLeft:"5px solid #8e44ad"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div>
                <span style={{background:"#f3e8ff",color:"#8e44ad",padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:700,marginRight:8}}>{m.type}</span>
                <span style={{fontWeight:700,fontSize:15}}>{m.date}</span>
              </div>
              {isAdmin&&<div style={{display:"flex",gap:6}}>
                <button onClick={()=>{setForm({...m});setSelected(m.id);setShowForm(true);}} style={{background:"#e8f0fe",color:"#2d6a9f",border:"none",borderRadius:5,padding:"4px 10px",cursor:"pointer",fontSize:11}}>수정</button>
                <button onClick={()=>setMeetings(meetings.filter(x=>x.id!==m.id))} style={{background:"#fde8e8",color:"#c0392b",border:"none",borderRadius:5,padding:"4px 10px",cursor:"pointer",fontSize:11}}>삭제</button>
              </div>}
            </div>
            <div style={{fontSize:12,color:"#888",marginBottom:10}}>
              📍 {m.venue||"장소 미기재"} · 참석 {m.attendCount}명
              {m.attendees&&m.attendees.length>0&&(
                <div style={{marginTop:6,display:"flex",flexWrap:"wrap",gap:4}}>
                  {m.attendees.map(a=><span key={a} style={{background:"#f0f0f0",color:"#555",padding:"1px 7px",borderRadius:20,fontSize:11}}>{a}</span>)}
                </div>
              )}
            </div>
            <div style={{fontSize:13,color:"#444",lineHeight:1.7,whiteSpace:"pre-wrap",background:"#fafafa",borderRadius:8,padding:"10px 14px"}}>{m.content}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── 목표금액 ──
function RecoveryPage({projects,setProjects,recoveryTarget,setRecoveryTarget,selectedProject,setSelectedProject,isAdmin}) {
  const [showProjectForm,setShowProjectForm]=useState(false);
  const [pForm,setPForm]=useState({name:"",target:""});
  const [txForm,setTxForm]=useState({date:"",desc:"",amount:"",type:"income"});
  const [showTxForm,setShowTxForm]=useState(false);
  const [editingTarget,setEditingTarget]=useState(false);
  const [targetInput,setTargetInput]=useState("");

  const recoveryTotal=projects.reduce((sum,p)=>sum+Math.max(p.transactions.reduce((s,t)=>s+t.amount,0),0),0);
  const recoveryPct=Math.min(100,Math.round(recoveryTotal/recoveryTarget*100));
  const curProject=selectedProject?projects.find(p=>p.id===selectedProject):null;

  const addProject=()=>{
    if(!pForm.name||!pForm.target)return;
    setProjects([...projects,{id:Date.now(),name:pForm.name,target:parseInt(pForm.target),transactions:[]}]);
    setPForm({name:"",target:""});setShowProjectForm(false);
  };
  const addTx=()=>{
    if(!txForm.date||!txForm.desc||!txForm.amount)return;
    const amt=txForm.type==="income"?Math.abs(parseInt(txForm.amount)):-Math.abs(parseInt(txForm.amount));
    setProjects(projects.map(p=>p.id===selectedProject?{...p,transactions:[...p.transactions,{id:Date.now(),date:txForm.date,desc:txForm.desc,amount:amt,type:txForm.type}]}:p));
    setTxForm({date:"",desc:"",amount:"",type:"income"});setShowTxForm(false);
  };

  const downloadAllProjects=()=>{
    const sheets=projects.map(p=>{
      const header=["날짜","내역","구분","금액"];
      const rows=p.transactions.map(t=>[t.date,t.desc,t.type==="income"?"수입":"지출",t.amount]);
      const income=p.transactions.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
      const expense=p.transactions.filter(t=>t.type==="expense").reduce((s,t)=>s+Math.abs(t.amount),0);
      const summary=[["","","",""],["목표금액","","",(p.target)],["총 수입","","",(income)],["총 지출","",(""),(expense)],["순수입","",(""),(income-expense)]];
      return{name:p.name.slice(0,30),data:[header,...rows,...summary]};
    });
    const overviewHeader=["사업명","목표금액","총수입","총지출","순수입","달성률"];
    const overviewRows=projects.map(p=>{
      const income=p.transactions.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
      const expense=p.transactions.filter(t=>t.type==="expense").reduce((s,t)=>s+Math.abs(t.amount),0);
      return[p.name,p.target,income,expense,income-expense,Math.round((income-expense)/p.target*100)+"%"];
    });
    downloadExcel([{name:"전체현황",data:[overviewHeader,...overviewRows]},...sheets],`부여미협_목표금액내역_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  const downloadCurProject=()=>{
    if(!curProject)return;
    const header=["날짜","내역","구분","금액"];
    const rows=curProject.transactions.map(t=>[t.date,t.desc,t.type==="income"?"수입":"지출",t.amount]);
    downloadExcel([{name:curProject.name.slice(0,30),data:[header,...rows]}],`부여미협_${curProject.name}_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <h2 style={{margin:0,fontSize:18,fontWeight:700}}>
          {curProject?<span><button onClick={()=>setSelectedProject(null)} style={{background:"none",border:"none",cursor:"pointer",color:"#2d6a9f",fontSize:14,marginRight:6}}>← 전체</button>{curProject.name}</span>:"🎯 목표금액 관리"}
        </h2>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {!curProject&&<ExcelBtn onClick={downloadAllProjects} label="전체 엑셀 다운로드"/>}
          {curProject&&<ExcelBtn onClick={downloadCurProject} label="이 사업 엑셀 다운로드"/>}
          {!curProject&&isAdmin&&<button onClick={()=>setShowProjectForm(true)} style={{background:"#2d6a9f",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontSize:13,fontWeight:600}}>+ 사업 추가</button>}
          {curProject&&isAdmin&&<button onClick={()=>setShowTxForm(true)} style={{background:"#2d6a9f",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontSize:13,fontWeight:600}}>+ 거래 추가</button>}
        </div>
      </div>

      {!curProject&&(
        <>
          <div style={{background:"linear-gradient(135deg,#1a3a5c,#2d6a9f)",borderRadius:12,padding:24,marginBottom:16,color:"#fff"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
              <div style={{fontSize:13,opacity:.8}}>총 목표 금액</div>
              {isAdmin&&!editingTarget&&<button onClick={()=>{setEditingTarget(true);setTargetInput(recoveryTarget.toString());}} style={{background:"rgba(255,255,255,.2)",border:"1px solid rgba(255,255,255,.4)",color:"#fff",borderRadius:6,padding:"3px 10px",cursor:"pointer",fontSize:11}}>✏️ 목표액 수정</button>}
            </div>
            {editingTarget?(
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
                <input type="number" value={targetInput} onChange={e=>setTargetInput(e.target.value)}
                  style={{flex:1,border:"2px solid rgba(255,255,255,.6)",borderRadius:8,padding:"8px 12px",fontSize:16,fontWeight:700,background:"rgba(255,255,255,.15)",color:"#fff",outline:"none"}} placeholder="목표금액(원)"/>
                <button onClick={()=>{const v=parseInt(targetInput);if(v>0){setRecoveryTarget(v);setEditingTarget(false);}}} style={{background:"#f9d342",color:"#333",border:"none",borderRadius:7,padding:"8px 14px",cursor:"pointer",fontWeight:700,fontSize:13}}>저장</button>
                <button onClick={()=>setEditingTarget(false)} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:7,padding:"8px 12px",cursor:"pointer",color:"#fff",fontSize:13}}>취소</button>
              </div>
            ):(
              <div style={{fontSize:28,fontWeight:700,marginBottom:12}}>{won(recoveryTarget)}</div>
            )}
            <div style={{background:"rgba(255,255,255,.2)",borderRadius:20,height:28,overflow:"hidden",marginBottom:8}}>
              <div style={{background:"linear-gradient(90deg,#f9d342,#f39c12)",height:"100%",width:`${recoveryPct}%`,borderRadius:20,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:10}}>
                <span style={{fontSize:13,fontWeight:700,color:"#333"}}>{recoveryPct}%</span>
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,opacity:.9}}>
              <span>달성: {won(recoveryTotal)}</span><span>잔여: {won(Math.max(0,recoveryTarget-recoveryTotal))}</span>
            </div>
          </div>

          {showProjectForm&&isAdmin&&(
            <div style={{background:"#fff",borderRadius:10,padding:16,marginBottom:14,boxShadow:"0 2px 10px rgba(0,0,0,.08)",border:"2px solid #2d6a9f"}}>
              <div style={{fontWeight:700,marginBottom:12,color:"#2d6a9f"}}>새 사업 등록</div>
              <div style={{display:"flex",gap:10}}>
                <input value={pForm.name} onChange={e=>setPForm({...pForm,name:e.target.value})} placeholder="사업명" style={{flex:1,border:"1px solid #e0e0e0",borderRadius:6,padding:"7px 10px",fontSize:13}}/>
                <input type="number" value={pForm.target} onChange={e=>setPForm({...pForm,target:e.target.value})} placeholder="목표금액(원)" style={{width:160,border:"1px solid #e0e0e0",borderRadius:6,padding:"7px 10px",fontSize:13}}/>
                <button onClick={addProject} style={{background:"#2d6a9f",color:"#fff",border:"none",borderRadius:7,padding:"7px 16px",cursor:"pointer",fontWeight:600}}>추가</button>
                <button onClick={()=>setShowProjectForm(false)} style={{background:"#f0f0f0",border:"none",borderRadius:7,padding:"7px 12px",cursor:"pointer"}}>취소</button>
              </div>
            </div>
          )}

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:12}}>
            {projects.map(p=>{
              const net=p.transactions.reduce((s,t)=>s+t.amount,0);
              const income=p.transactions.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
              const expense=p.transactions.filter(t=>t.type==="expense").reduce((s,t)=>s+Math.abs(t.amount),0);
              const pct=Math.min(100,Math.round(net/p.target*100));
              return(
                <div key={p.id} style={{background:"#fff",borderRadius:12,padding:18,boxShadow:"0 1px 6px rgba(0,0,0,.07)",cursor:"pointer"}} onClick={()=>setSelectedProject(p.id)}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                    <div style={{fontWeight:700,fontSize:14}}>{p.name}</div>
                    {isAdmin&&<button onClick={e=>{
                      e.stopPropagation();
                      if(!setProjects){alert("🔒 관리자만 삭제 가능합니다.");return;}
                      if(window.confirm(`"${p.name}" 사업을 삭제할까요?`))
                        setProjects(projects.filter(x=>x.id!==p.id));
                    }} style={{background:"#fde8e8",color:"#c0392b",border:"none",borderRadius:5,padding:"3px 8px",cursor:"pointer",fontSize:11}}>삭제</button>}
                  </div>
                  <div style={{fontSize:12,color:"#888",marginBottom:10,display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
                    <span>목표: {won(p.target)}</span><span>순수입: {won(net)}</span>
                    <span style={{color:"#27ae60"}}>수입: {won(income)}</span><span style={{color:"#e74c3c"}}>지출: {won(expense)}</span>
                  </div>
                  <div style={{background:"#f5f5f5",borderRadius:10,height:14}}>
                    <div style={{background:pct>=100?"#27ae60":"linear-gradient(90deg,#2d6a9f,#5ba3d9)",height:"100%",width:`${pct}%`,borderRadius:10}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#aaa",marginTop:4}}>
                    <span>{p.transactions.length}건</span><span>{pct}% 달성</span>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}

      {curProject&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:14}}>
            {[
              {label:"목표 금액",value:won(curProject.target),color:"#2d6a9f"},
              {label:"총 수입",value:won(curProject.transactions.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0)),color:"#27ae60"},
              {label:"총 지출",value:won(curProject.transactions.filter(t=>t.type==="expense").reduce((s,t)=>s+Math.abs(t.amount),0)),color:"#e74c3c"},
            ].map((c,i)=>(
              <div key={i} style={{background:"#fff",borderRadius:10,padding:"14px 18px",boxShadow:"0 1px 4px rgba(0,0,0,.06)",textAlign:"center"}}>
                <div style={{fontSize:11,color:"#888"}}>{c.label}</div>
                <div style={{fontSize:18,fontWeight:700,color:c.color,marginTop:4}}>{c.value}</div>
              </div>
            ))}
          </div>
          {showTxForm&&isAdmin&&(
            <div style={{background:"#fff",borderRadius:10,padding:16,marginBottom:14,boxShadow:"0 2px 10px rgba(0,0,0,.08)",border:"2px solid #2d6a9f"}}>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
                <div><label style={{fontSize:11,color:"#888"}}>날짜</label><br/><input type="date" value={txForm.date} onChange={e=>setTxForm({...txForm,date:e.target.value})} style={{border:"1px solid #e0e0e0",borderRadius:6,padding:"6px 10px",fontSize:13}}/></div>
                <div style={{flex:1,minWidth:150}}><label style={{fontSize:11,color:"#888"}}>내역</label><br/><input value={txForm.desc} onChange={e=>setTxForm({...txForm,desc:e.target.value})} style={{width:"100%",border:"1px solid #e0e0e0",borderRadius:6,padding:"6px 10px",fontSize:13,boxSizing:"border-box"}}/></div>
                <div><label style={{fontSize:11,color:"#888"}}>금액</label><br/><input type="number" value={txForm.amount} onChange={e=>setTxForm({...txForm,amount:e.target.value})} style={{width:120,border:"1px solid #e0e0e0",borderRadius:6,padding:"6px 10px",fontSize:13}}/></div>
                <div><label style={{fontSize:11,color:"#888"}}>구분</label><br/><select value={txForm.type} onChange={e=>setTxForm({...txForm,type:e.target.value})} style={{border:"1px solid #e0e0e0",borderRadius:6,padding:"6px 10px",fontSize:13}}><option value="income">수입</option><option value="expense">지출</option></select></div>
                <button onClick={addTx} style={{background:"#2d6a9f",color:"#fff",border:"none",borderRadius:7,padding:"8px 16px",cursor:"pointer",fontWeight:600,height:34}}>추가</button>
                <button onClick={()=>setShowTxForm(false)} style={{background:"#f0f0f0",border:"none",borderRadius:7,padding:"8px 12px",cursor:"pointer",height:34}}>취소</button>
              </div>
            </div>
          )}
          <div style={{background:"#fff",borderRadius:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)",overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:"#f8f9fa"}}>{["날짜","내역","구분","금액",""].map((h,i)=><th key={i} style={{padding:"10px 14px",textAlign:i>=3?"right":"left",color:"#666",fontWeight:600}}>{h}</th>)}</tr></thead>
              <tbody>{[...curProject.transactions].reverse().map((t,i)=>(
                <tr key={t.id} style={{borderTop:"1px solid #f5f5f5",background:i%2?"#fafafa":"#fff"}}>
                  <td style={{padding:"8px 14px",color:"#888"}}>{t.date}</td>
                  <td style={{padding:"8px 14px"}}>{t.desc}</td>
                  <td style={{padding:"8px 14px"}}><span style={{background:t.type==="income"?"#e8f5e9":"#fde8e8",color:t.type==="income"?"#27ae60":"#e74c3c",padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:600}}>{t.type==="income"?"수입":"지출"}</span></td>
                  <td style={{padding:"8px 14px",textAlign:"right",color:t.type==="income"?"#27ae60":"#e74c3c",fontWeight:600}}>{t.type==="income"?"+":""}{(t.amount||0).toLocaleString()}</td>
                  <td style={{padding:"8px 14px"}}>{isAdmin&&<button onClick={()=>{
                    if(!setProjects){alert("🔒 관리자만 삭제 가능합니다.");return;}
                    setProjects(projects.map(p=>p.id===selectedProject?{...p,transactions:p.transactions.filter(tx=>tx.id!==t.id)}:p));
                  }} style={{background:"#fde8e8",color:"#c0392b",border:"none",borderRadius:5,padding:"3px 8px",cursor:"pointer",fontSize:11}}>삭제</button>}</td>
                </tr>
              ))}</tbody>
            </table>
            {curProject.transactions.length===0&&<div style={{textAlign:"center",padding:30,color:"#ccc",fontSize:13}}>거래 내역이 없습니다</div>}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
