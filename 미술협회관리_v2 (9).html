// ── Excel 다운로드 유틸 ──
function downloadExcel(sheets, filename) {
  const wb = XLSX.utils.book_new();
  sheets.forEach(({name, data}) => {
    const ws = XLSX.utils.aoa_to_sheet(data);
    // column widths
    const cols = data[0] ? data[0].map((_,i)=>({wch: Math.max(...data.map(r=>(r[i]||"").toString().length), 10)})) : [];
    ws['!cols'] = cols;
    XLSX.utils.book_append_sheet(wb, ws, name);
  });
  XLSX.writeFile(wb, filename);
}

// ── Firebase 저장/읽기 헬퍼 ──
async function saveToFirestore(key, data) {
  if(!window._firestore) return;
  const {db, doc, setDoc} = window._firestore;
  try {
    await setDoc(doc(db, "art-association", key), {data: JSON.stringify(data), updatedAt: Date.now()});
  } catch(e) { console.error("Save error:", e); }
}
async function loadFromFirestore(key) {
  if(!window._firestore) return null;
  const {db, doc, getDoc} = window._firestore;
  try {
    const snap = await getDoc(doc(db, "art-association", key));
    if(snap.exists()) return JSON.parse(snap.data().data);
  } catch(e) { console.error("Load error:", e); }
  return null;
}
function subscribeFirestore(key, callback) {
  if(!window._firestore) return ()=>{};
  const {db, doc, onSnapshot} = window._firestore;
  return onSnapshot(doc(db, "art-association", key), snap => {
    if(snap.exists()) {
      try { callback(JSON.parse(snap.data().data)); } catch(e){}
    }
  });
}

// ── 비밀번호 변경 모달 ──
function PwChangeModal({adminPw, setAdminPw, onClose}) {
  const [cur,setCur]=useState("");
  const [n1,setN1]=useState("");
  const [n2,setN2]=useState("");
  const [msg,setMsg]=useState("");
  const [done,setDone]=useState(false);
  const change=()=>{
    if(cur!==adminPw){setMsg("현재 비밀번호가 틀렸습니다.");return;}
    if(n1.length<4){setMsg("새 비밀번호는 4자 이상이어야 합니다.");return;}
    if(n1!==n2){setMsg("새 비밀번호가 일치하지 않습니다.");return;}
    setAdminPw(n1);
    localStorage.setItem('art_admin_pw',n1);
    setDone(true);
  };
  return (
    <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",background:"rgba(0,0,0,.5)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,boxSizing:"border-box"}}>
      <div style={{background:"#fff",borderRadius:16,padding:28,width:"100%",maxWidth:360,boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontWeight:700,fontSize:16,color:"#1a3a5c"}}>🔑 비밀번호 변경</div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#aaa"}}>✕</button>
        </div>
        {done?(
          <div>
            <div style={{textAlign:"center",padding:"20px 0",color:"#27ae60",fontSize:15,fontWeight:600}}>✅ 비밀번호가 변경되었습니다!</div>
            <button onClick={onClose} style={{width:"100%",background:"#2d6a9f",color:"#fff",border:"none",borderRadius:8,padding:"11px",cursor:"pointer",fontWeight:700,fontSize:14}}>확인</button>
          </div>
        ):(
          <div>
            {[["현재 비밀번호",cur,setCur],["새 비밀번호",n1,setN1],["새 비밀번호 확인",n2,setN2]].map(([label,val,setter])=>(
              <div key={label} style={{marginBottom:12}}>
                <label style={{fontSize:12,color:"#666",fontWeight:600}}>{label}</label>
                <input type="password" value={val} onChange={e=>{setter(e.target.value);setMsg("");}}
                  onKeyDown={e=>e.key==="Enter"&&change()}
                  style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:7,padding:"9px 12px",fontSize:14,boxSizing:"border-box",marginTop:4,outline:"none"}}/>
              </div>
            ))}
            {msg&&<div style={{fontSize:12,color:"#e74c3c",padding:"6px 10px",background:"#fde8e8",borderRadius:6,marginBottom:10}}>{msg}</div>}
            <button onClick={change} style={{width:"100%",background:"linear-gradient(135deg,#1a3a5c,#2d6a9f)",color:"#fff",border:"none",borderRadius:8,padding:"12px",cursor:"pointer",fontWeight:700,fontSize:14}}>변경하기</button>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [isAdmin,setIsAdmin]=useState(null);
  const [adminPw,setAdminPw]=useState(()=>localStorage.getItem('art_admin_pw')||'art3144');
  const [showPwChange,setShowPwChange]=useState(false);
  const [page,setPage]=useState("home");
  const [members,setMembersState]=useState(initialMembers);
  const [fees,setFeesState]=useState(initialFees);
  const [feeYears,setFeeYearsState]=useState(["y2023","y2024","y2025","y2026"]);
  const [yearLabels,setYearLabelsState]=useState({y2023:"2023년",y2024:"2024년",y2025:"2025년",y2026:"2026년"});
  const [transactions,setTransactionsState]=useState(initialTransactions);
  const [meetings,setMeetingsState]=useState(initialMeetings);
  const [projects,setProjectsState]=useState(initialProjects);
  const [recoveryTarget,setRecoveryTargetState]=useState(20000000);
  const [selectedProject,setSelectedProject]=useState(null);
  const [dbReady,setDbReady]=useState(false);
  const [saving,setSaving]=useState(false);
  const skipSave=useRef(false);

  // Firebase 구독 & 초기 로드
  useEffect(()=>{
    if(!window._firestore){
      setTimeout(()=>setDbReady(false),2000);
      return;
    }
    const keys=["members","fees","feeYears","yearLabels","transactions","meetings","projects","recoveryTarget"];
    const setters={members:setMembersState,fees:setFeesState,feeYears:setFeeYearsState,yearLabels:setYearLabelsState,transactions:setTransactionsState,meetings:setMeetingsState,projects:setProjectsState,recoveryTarget:setRecoveryTargetState};
    const unsubs=keys.map(k=>subscribeFirestore(k,d=>{
      skipSave.current=true;
      setters[k](d);
      setTimeout(()=>{skipSave.current=false;},200);
    }));
    Promise.all(keys.map(k=>loadFromFirestore(k))).then(results=>{
      results.forEach((d,i)=>{ if(d!==null){ skipSave.current=true; setters[keys[i]](d); } });
      setTimeout(()=>{skipSave.current=false; setDbReady(true);},300);
    });
    return ()=>unsubs.forEach(u=>u&&u());
  },[]);

  // 저장 래퍼
  const saveKey=async(key,data)=>{
    if(skipSave.current||!dbReady) return;
    setSaving(true);
    await saveToFirestore(key,data);
    setSaving(false);
  };
  const setMembers=d=>{setMembersState(d);saveKey("members",d);};
  const setFees=d=>{setFeesState(d);saveKey("fees",d);};
  const setFeeYears=d=>{setFeeYearsState(d);saveKey("feeYears",d);};
  const setYearLabels=d=>{setYearLabelsState(d);saveKey("yearLabels",d);};
  const setTransactions=d=>{setTransactionsState(d);saveKey("transactions",d);};
  const setMeetings=d=>{setMeetingsState(d);saveKey("meetings",d);};
  const setProjects=d=>{setProjectsState(d);saveKey("projects",d);};
  const setRecoveryTarget=d=>{setRecoveryTargetState(d);saveKey("recoveryTarget",d);};

  const recoveryTotal=useMemo(()=>projects.reduce((sum,p)=>sum+Math.max(p.transactions.reduce((s,t)=>s+t.amount,0),0),0),[projects]);
  const recoveryPct=Math.min(100,Math.round(recoveryTotal/recoveryTarget*100));

  if(isAdmin===null) return <LoginPage onLogin={setIsAdmin} adminPw={adminPw}/>;

  const navItems=[
    {key:"home",icon:"🏠",label:"홈"},
    {key:"members",icon:"👥",label:"회원관리"},
    {key:"fees",icon:"💰",label:"회비납부"},
    {key:"bank",icon:"🏦",label:"통장내역"},
    {key:"meetings",icon:"📋",label:"회의록"},
    {key:"recovery",icon:"📊",label:"목표금액"},
  ];

  return (
    <>
    {showPwChange&&<PwChangeModal adminPw={adminPw} setAdminPw={setAdminPw} onClose={()=>setShowPwChange(false)}/>}
    <div style={{fontFamily:"'Noto Sans KR',sans-serif",background:"#f0f2f5",minHeight:"100vh"}}>
      <div style={{background:"linear-gradient(135deg,#1a3a5c,#2d6a9f)",color:"#fff",padding:"0 16px 0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",height:58,boxShadow:"0 2px 8px rgba(0,0,0,.2)",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <img src={LOGO} alt="로고" style={{height:40,objectFit:"contain",filter:"brightness(0) invert(1)"}}/>
          <div>
            <div style={{fontWeight:700,fontSize:15,letterSpacing:-.5}}>한국미술협회 부여지부</div>
            <div style={{fontSize:10,opacity:.7,marginTop:-2}}>회원·재무 통합 관리시스템</div>
          </div>
        </div>
        <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
          {navItems.map(n=>(
            <button key={n.key} onClick={()=>{setPage(n.key);setSelectedProject(null);}}
              style={{background:page===n.key?"rgba(255,255,255,.25)":"transparent",border:"none",color:"#fff",padding:"6px 10px",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:page===n.key?700:400,display:"flex",alignItems:"center",gap:4}}>
              <span>{n.icon}</span><span>{n.label}</span>

          <SyncBadge saving={saving} dbReady={dbReady}/>
          <div style={{padding:"4px 10px",background:isAdmin?"rgba(255,220,100,.25)":"rgba(255,255,255,.15)",borderRadius:20,fontSize:11,fontWeight:600,display:"flex",alignItems:"center",gap:4,border:"1px solid rgba(255,255,255,.3)"}}>
            {isAdmin?<>👑 관리자</>:<>👁️ 열람전용</>}
          </div>
          {isAdmin&&<button onClick={()=>setShowPwChange(true)} style={{background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.3)",color:"#fff",padding:"5px 10px",borderRadius:20,cursor:"pointer",fontSize:11,marginRight:4}}>🔑 비번변경</button>}

        {page==="bank"     && <BankPage transactions={transactions} setTransactions={isAdmin?setTransactions:null} isAdmin={isAdmin}/>}
        {page==="meetings" && <MeetingsPage meetings={meetings} setMeetings={isAdmin?setMeetings:null} members={members} isAdmin={isAdmin}/>}

// ── 회원관리 ──
function MembersPage({members,setMembers,fees,setFees,feeYears,isAdmin}) {
  const [search,setSearch]=useState("");
  const [filterField,setFilterField]=useState("");
  const [filterGender,setFilterGender]=useState("");
  const [filterPos,setFilterPos]=useState("");
  const [editing,setEditing]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({name:"",gender:"여",zip:"",address:"",phone:"",field:"한국화",position:"",birth:"",joined:""});

  const fields=[...new Set(members.map(m=>m.field).filter(Boolean))].sort();
  const positions=[...new Set(members.map(m=>m.position).filter(Boolean))].sort();
  const filtered=members.filter(m=>{
    const q=search.toLowerCase();
    return(!q||m.name.includes(q)||(m.address||"").includes(q)||(m.phone||"").includes(q))&&
           (!filterField||m.field===filterField)&&(!filterGender||m.gender===filterGender)&&(!filterPos||m.position===filterPos);
  }).sort((a,b)=>a.name.localeCompare(b.name,"ko"));

  const saveForm=()=>{
    if(!form.name.trim())return;
    if(editing!==null){
      // 회원 수정 — 이름이 바뀌면 fees에서도 이름 업데이트
      const oldMember=members.find(m=>m.id===editing);
      setMembers(members.map(m=>m.id===editing?{...form,id:editing}:m));
      if(oldMember&&oldMember.name!==form.name&&fees&&setFees){
        setFees(fees.map(f=>f.memberId===editing?{...f,name:form.name}:f));
      }
      setEditing(null);
    } else {
      // 신규 회원 — fees에도 자동으로 행 추가 (모든 연도 0으로)
      const newId=Date.now();
      const newMember={...form,id:newId};
      setMembers([...members,newMember]);
      if(fees&&setFees&&feeYears){
        const feeRow={memberId:newId,name:form.name};
        feeYears.forEach(y=>{feeRow[y]=0;});
        setFees([...fees,feeRow]);
      }
    }
    setForm({name:"",gender:"여",zip:"",address:"",phone:"",field:"한국화",position:"",birth:"",joined:""});
    setShowForm(false);
  };

  const deleteMember=(id,name)=>{
    if(!window.confirm(`"${name}" 회원을 삭제할까요?\n회비 납부 내역도 함께 삭제됩니다.`))return;
    if(!setMembers){alert("🔒 관리자만 삭제할 수 있습니다.");return;}
    setMembers(members.filter(m=>m.id!==id));
    if(fees&&setFees) setFees(fees.filter(f=>f.memberId!==id));
  };

  const downloadMembers=()=>{
    const header=["번호","이름","성별","분야","직위","우편번호","주소","연락처","생년월일","가입일"];
    const rows=filtered.map((m,i)=>[i+1,m.name,m.gender,m.field,m.position,m.zip,m.address,m.phone,m.birth,m.joined]);
    downloadExcel([{name:"회원명단",data:[header,...rows]}],`부여미협_회원명단_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  const closeModal=()=>{setShowForm(false);setEditing(null);setForm({name:"",gender:"여",zip:"",address:"",phone:"",field:"한국화",position:"",birth:"",joined:""});};

  const MemberModal=()=>showForm?(
    <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",background:"rgba(0,0,0,.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,boxSizing:"border-box"}}
      onClick={e=>{if(e.target===e.currentTarget)closeModal();}}>
      <div style={{background:"#fff",borderRadius:16,padding:24,width:"100%",maxWidth:500,boxShadow:"0 20px 60px rgba(0,0,0,.3)",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div style={{fontWeight:700,fontSize:16,color:"#2d6a9f"}}>{editing?"✏️ 회원 수정":"➕ 신규 회원 등록"}</div>
          <button onClick={closeModal} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#aaa",lineHeight:1}}>✕</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          {[["name","이름"],["phone","연락처"],["zip","우편번호"],["birth","생년월일"],["joined","가입일"]].map(([k,l])=>(
            <div key={k}><label style={{fontSize:11,color:"#888",fontWeight:600}}>{l}</label>
              <input value={form[k]||""} onChange={e=>setForm({...form,[k]:e.target.value})
              } style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:7,padding:"8px 10px",fontSize:13,boxSizing:"border-box",marginTop:3}}/></div>
          ))}
          <div><label style={{fontSize:11,color:"#888",fontWeight:600}}>성별</label>
            <select value={form.gender} onChange={e=>setForm({...form,gender:e.target.value})} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:7,padding:"8px 10px",fontSize:13,marginTop:3}}>
              <option>여</option><option>남</option></select></div>
          <div><label style={{fontSize:11,color:"#888",fontWeight:600}}>분야</label>
            <select value={form.field} onChange={e=>setForm({...form,field:e.target.value})} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:7,padding:"8px 10px",fontSize:13,marginTop:3}}>
              {["한국화","서양화","서예","공예","수채화","기타"].map(f=><option key={f}>{f}</option>)}</select></div>
          <div><label style={{fontSize:11,color:"#888",fontWeight:600}}>직위</label>
            <input value={form.position||""} onChange={e=>setForm({...form,position:e.target.value})} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:7,padding:"8px 10px",fontSize:13,marginTop:3}}/></div>
        </div>
        <div style={{marginTop:12}}><label style={{fontSize:11,color:"#888",fontWeight:600}}>주소</label>
          <input value={form.address||""} onChange={e=>setForm({...form,address:e.target.value})} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:7,padding:"8px 10px",fontSize:13,boxSizing:"border-box",marginTop:3}}/></div>
        <div style={{display:"flex",gap:8,marginTop:18}}>
          <button onClick={saveForm} style={{flex:1,background:"linear-gradient(135deg,#2d6a9f,#4a90c4)",color:"#fff",border:"none",borderRadius:8,padding:"11px",cursor:"pointer",fontWeight:700,fontSize:14}}>💾 저장</button>
          <button onClick={closeModal} style={{background:"#f0f0f0",border:"none",borderRadius:8,padding:"11px 20px",cursor:"pointer",fontSize:13}}>취소</button>
        </div>
      </div>
    </div>
  ):null;

  return (
    <div>
      <MemberModal/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <h2 style={{margin:0,fontSize:18,fontWeight:700}}>👥 회원 관리 <span style={{fontSize:13,color:"#888",fontWeight:400}}>({filtered.length}/{members.length}명)</span></h2>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <ExcelBtn onClick={downloadMembers} label="회원명단 다운로드"/>
          {isAdmin&&<button onClick={()=>{setEditing(null);setForm({name:"",gender:"여",zip:"",address:"",phone:"",field:"한국화",position:"",birth:"",joined:""});setShowForm(true);}} style={{background:"#2d6a9f",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontSize:13,fontWeight:600}}>+ 회원 등록</button>}
        </div>
      </div>
      <div style={{background:"#fff",borderRadius:10,padding:14,marginBottom:14,display:"flex",gap:10,flexWrap:"wrap",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="이름·주소·연락처 검색" style={{flex:1,minWidth:160,border:"1px solid #e0e0e0",borderRadius:7,padding:"7px 12px",fontSize:13}}/>
        <select value={filterField} onChange={e=>setFilterField(e.target.value)} style={{border:"1px solid #e0e0e0",borderRadius:7,padding:"7px 12px",fontSize:13}}>
          <option value="">전체 분야</option>{fields.map(f=><option key={f}>{f}</option>)}
        </select>
        <select value={filterGender} onChange={e=>setFilterGender(e.target.value)} style={{border:"1px solid #e0e0e0",borderRadius:7,padding:"7px 12px",fontSize:13}}>
          <option value="">전체 성별</option><option value="남">남</option><option value="여">여</option>
        </select>
        <select value={filterPos} onChange={e=>setFilterPos(e.target.value)} style={{border:"1px solid #e0e0e0",borderRadius:7,padding:"7px 12px",fontSize:13}}>
          <option value="">전체 직위</option>{positions.map(p=><option key={p}>{p}</option>)}
        </select>
      </div>
      <div style={{background:"#fff",borderRadius:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)",overflow:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
          <thead><tr style={{background:"#f8f9fa",borderBottom:"2px solid #e8e8e8"}}>
            {["이름","성별","분야","직위","연락처","주소",""].map((h,i)=>(
              <th key={i} style={{padding:"10px 12px",textAlign:"left",color:"#666",fontWeight:600,whiteSpace:"nowrap"}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>{filtered.map((m,i)=>(
            <tr key={m.id} style={{borderBottom:"1px solid #f5f5f5",background:i%2===0?"#fff":"#fafafa"}}>
              <td style={{padding:"8px 12px",fontWeight:600}}>{m.name}</td>
              <td style={{padding:"8px 12px",color:m.gender==="남"?"#4f86c6":"#e07b54"}}>{m.gender||"-"}</td>
              <td style={{padding:"8px 12px"}}>{m.field&&<span style={{background:fieldColors[m.field]+"22",color:fieldColors[m.field],padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:600}}>{m.field}</span>}</td>
              <td style={{padding:"8px 12px",color:"#666"}}>{m.position||"-"}</td>
              <td style={{padding:"8px 12px",color:"#888"}}>{m.phone||"-"}</td>
              <td style={{padding:"8px 12px",color:"#888",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.address||"-"}</td>
              <td style={{padding:"8px 12px",whiteSpace:"nowrap"}}>
                {isAdmin&&<><button onClick={()=>{setForm({...m});setEditing(m.id);setShowForm(true);}} style={{background:"#e8f0fe",color:"#2d6a9f",border:"none",borderRadius:5,padding:"3px 8px",cursor:"pointer",marginRight:4,fontSize:11}}>수정</button>
                <button onClick={()=>deleteMember(m.id,m.name)} style={{background:"#fde8e8",color:"#c0392b",border:"none",borderRadius:5,padding:"3px 8px",cursor:"pointer",fontSize:11}}>삭제</button></>}
              </td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    </div>
  );
}

      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#fff",borderRadius:16,padding:24,width:"100%",maxWidth:480,boxShadow:"0 20px 60px rgba(0,0,0,.35)",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div style={{fontWeight:700,fontSize:16,color:"#2d6a9f"}}>💰 {member.name} 회비 수정</div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#aaa",lineHeight:1}}>✕</button>

        <div style={{background:"#fdf5ff",borderRadius:10,padding:14,marginBottom:14,border:"1px solid #e8d0f8"}}>

            </div>
            <div>
              <label style={{fontSize:11,color:"#888",fontWeight:600,display:"block",marginBottom:3}}>납부일</label>
              <input type="date" value={data.entry_date||""}
                onChange={e=>setData(d=>({...d,entry_date:e.target.value}))}

          <div style={{fontWeight:700,color:"#2d6a9f",marginBottom:10,fontSize:13}}>📅 연도별 회비</div>
          {yearOnlyKeys.map((y,idx)=>(
            <div key={y} style={{background:idx===0?"#e8f8ef":"#fff",borderRadius:8,padding:10,marginBottom:8,border:idx===0?"1px solid #a8d8b8":"1px solid #e8e8e8"}}>
              <div style={{fontWeight:700,fontSize:12,color:idx===0?"#1a7a3c":"#555",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
                {idx===0&&<span style={{background:"#27ae60",color:"#fff",borderRadius:10,padding:"1px 7px",fontSize:10}}>최신</span>}
                {yearLabels[y]}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div>
                  <label style={{fontSize:11,color:"#888",fontWeight:600,display:"block",marginBottom:3}}>금액 (원)</label>
                  <input type="number" value={data[y]||0}
                    onChange={e=>setData(d=>({...d,[y]:parseInt(e.target.value)||0}))}
                    style={{width:"100%",border:"1.5px solid #90b8e0",borderRadius:7,padding:"9px 10px",fontSize:14,boxSizing:"border-box"}}/>
                </div>
                <div>
                  <label style={{fontSize:11,color:"#888",fontWeight:600,display:"block",marginBottom:3}}>납부일</label>
                  <input type="date" value={data[y+"_date"]||""}
                    onChange={e=>setData(d=>({...d,[y+"_date"]:e.target.value}))}
                    style={{width:"100%",border:"1.5px solid #90b8e0",borderRadius:7,padding:"9px 10px",fontSize:14,boxSizing:"border-box"}}/>

          <button onClick={onSave} style={{flex:1,background:"linear-gradient(135deg,#2d6a9f,#4a90c4)",color:"#fff",border:"none",borderRadius:8,padding:"12px",cursor:"pointer",fontWeight:700,fontSize:14}}>💾 저장</button>

function FeesPage({fees,setFees,feeYears,setFeeYears,yearLabels,setYearLabels,transactions,setTransactions,isAdmin}) {
  const [search,setSearch]=useState("");
  const [showAddYear,setShowAddYear]=useState(false);
  const [newYear,setNewYear]=useState("");
  const [editMember,setEditMember]=useState(null);
  const [editData,setEditData]=useState({});

  const yearOnlyKeys=useMemo(()=>
    feeYears.filter(y=>y!=="entry").sort((a,b)=>b.localeCompare(a))
  ,[feeYears]);

  const filtered=useMemo(()=>fees
    .filter(f=>!search||f.name.includes(search))
    .sort((a,b)=>a.name.localeCompare(b.name,"ko"))
  ,[fees,search]);

  const yearTotals=useMemo(()=>yearOnlyKeys.reduce((acc,y)=>{
    acc[y]=fees.reduce((s,f)=>s+(f[y]||0),0); return acc;
  },{}),[fees,yearOnlyKeys]);
  const yearCounts=useMemo(()=>yearOnlyKeys.reduce((acc,y)=>{
    acc[y]=fees.filter(f=>(f[y]||0)>0).length; return acc;
  },{}),[fees,yearOnlyKeys]);
  const entryTotal=useMemo(()=>fees.reduce((s,f)=>s+(f.entry||0),0),[fees]);
  const grandTotal=useMemo(()=>filtered.reduce((s,r)=>
    s+yearOnlyKeys.reduce((a,y)=>a+(r[y]||0),0)+(r.entry||0)
  ,0),[filtered,yearOnlyKeys]);

  const addYear=()=>{
    const y=newYear.trim();if(!y)return;
    const key="y"+y;
    if(feeYears.includes(key)){alert("이미 존재하는 연도입니다.");return;}
    setFeeYears([...feeYears,key]);
    setYearLabels({...yearLabels,[key]:y+"년"});
    setFees(fees.map(f=>({...f,[key]:0,[key+"_date"]:""})));
    setNewYear("");setShowAddYear(false);
  };
  const removeYear=(key)=>{
    if(!window.confirm(`"${yearLabels[key]}" 연도를 삭제할까요?`))return;
    setFeeYears(feeYears.filter(y=>y!==key));
    const nl={...yearLabels};delete nl[key];setYearLabels(nl);
  };

  const openEdit=(row)=>{setEditMember(row);setEditData({...row});};
  const closeEdit=()=>{setEditMember(null);};

  const saveEdit=()=>{
    const oldRow=fees.find(f=>f.memberId===editMember.memberId)||{};
    // 금액이 늘어난 항목만 통장내역에 자동 추가
    if(setTransactions&&transactions){
      const lastBal=transactions.length?transactions[transactions.length-1].balance:0;
      let runBal=lastBal;
      const added=[];
      // 가입비 차액
      const entryDiff=(editData.entry||0)-(oldRow.entry||0);
      if(entryDiff>0){
        const dateStr=editData.entry_date||new Date().toISOString().slice(0,10);
        runBal+=entryDiff;
        added.push({id:Date.now()+Math.random(),date:dateStr,desc:`${editData.name} 가입비`,amount:entryDiff,type:"income",balance:runBal});
      }
      // 연도별 회비 차액
      yearOnlyKeys.forEach(y=>{
        const diff=(editData[y]||0)-(oldRow[y]||0);
        if(diff>0){
          const dateStr=editData[y+"_date"]||new Date().toISOString().slice(0,10);
          runBal+=diff;
          added.push({id:Date.now()+Math.random(),date:dateStr,desc:`${editData.name} ${yearLabels[y]||y} 회비`,amount:diff,type:"income",balance:runBal});
        }
      });
      if(added.length>0){
        const merged=[...transactions,...added].sort((a,b)=>a.date.localeCompare(b.date));
        // 잔액 재계산
        let bal=0;
        setTransactions(merged.map(t=>{bal+=t.amount;return{...t,balance:bal};}));
      }
    }
    setFees(fees.map(f=>f.memberId===editMember.memberId?{...editData}:f));
    closeEdit();
  };

  const downloadFees=()=>{
    const header=["성명","가입비","납부일",...yearOnlyKeys.flatMap(y=>[yearLabels[y]+" 금액",yearLabels[y]+" 납부일"]),"소계"];
    const rows=filtered.map(r=>{
      const sub=yearOnlyKeys.reduce((s,y)=>s+(r[y]||0),0)+(r.entry||0);
      return[r.name,r.entry||0,r.entry_date||"",...yearOnlyKeys.flatMap(y=>[r[y]||0,r[y+"_date"]||""]),sub];
    });
    const totalRow=["합계",entryTotal,"",...yearOnlyKeys.flatMap(y=>[yearTotals[y]||0,""]),grandTotal];
    downloadExcel([{name:"회비납부현황",data:[header,...rows,totalRow]}],
      `부여미협_회비납부현황_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  return (
    <div>
      <FeeEditModal
        member={editMember}
        data={editData}
        setData={setEditData}
        yearOnlyKeys={yearOnlyKeys}
        yearLabels={yearLabels}
        onSave={saveEdit}
        onClose={closeEdit}
      />
      {/* 헤더 */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <h2 style={{margin:0,fontSize:18,fontWeight:700}}>💰 회원별 회비 납부 현황</h2>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="이름 검색"
            style={{border:"1px solid #e0e0e0",borderRadius:7,padding:"7px 12px",fontSize:13,width:120}}/>
          <ExcelBtn onClick={downloadFees} label="엑셀 다운로드"/>
          {isAdmin&&<button onClick={()=>setShowAddYear(!showAddYear)}
            style={{background:"#27ae60",color:"#fff",border:"none",borderRadius:7,padding:"7px 14px",cursor:"pointer",fontSize:13,fontWeight:600,whiteSpace:"nowrap"}}>
            {showAddYear?"✕ 닫기":"+ 연도 추가"}
          </button>}
        </div>
      </div>
      {/* 연도 추가 폼 */}
      {showAddYear&&isAdmin&&(
        <div style={{background:"#fff",borderRadius:10,padding:14,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,.08)",border:"2px solid #27ae60",display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:13,fontWeight:600,color:"#27ae60"}}>새 연도 추가</span>
          <input type="number" value={newYear} onChange={e=>setNewYear(e.target.value)} placeholder="예) 2027"
            style={{border:"1px solid #e0e0e0",borderRadius:6,padding:"6px 10px",fontSize:13,width:110}}
            onKeyDown={e=>{if(e.key==="Enter")addYear();}}/>
          <button onClick={addYear} style={{background:"#27ae60",color:"#fff",border:"none",borderRadius:6,padding:"7px 16px",cursor:"pointer",fontWeight:600}}>추가</button>
          <button onClick={()=>{setShowAddYear(false);setNewYear("");}} style={{background:"#f0f0f0",border:"none",borderRadius:6,padding:"7px 12px",cursor:"pointer"}}>취소</button>
        </div>
      )}
      {/* 안내 */}
      <div style={{fontSize:11,marginBottom:6,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
        <span style={{background:"#f0f4ff",color:"#2d6a9f",borderRadius:20,padding:"2px 9px"}}>총 {filtered.length}명</span>
        <span style={{background:"#f3e8ff",color:"#8e44ad",borderRadius:20,padding:"2px 9px"}}>가입비 {fees.filter(f=>f.entry>0).length}명 · {entryTotal.toLocaleString()}원</span>
        {isAdmin&&<span style={{color:"#aaa"}}>· 수정 버튼 클릭 시 팝업창에서 입력</span>}
      </div>
      {/* 테이블 */}
      <div style={{background:"#fff",borderRadius:10,boxShadow:"0 1px 6px rgba(0,0,0,.08)",overflowX:"auto"}}>
        <table style={{borderCollapse:"collapse",fontSize:12.5,whiteSpace:"nowrap"}}>
          <thead>
            <tr style={{background:"#1a3a5c"}}>
              <th style={{position:"sticky",left:0,zIndex:4,padding:"10px 14px",textAlign:"left",color:"#fff",fontWeight:700,background:"#1a3a5c",minWidth:70,borderRight:"1px solid #2d5a8c"}}>성명</th>
              <th colSpan={2} style={{padding:"8px 10px",textAlign:"center",color:"#f3c8ff",fontWeight:700,background:"#3a1f5c",borderRight:"2px solid #5c3a8c",minWidth:180}}>🎫 가입비</th>
              {yearOnlyKeys.map((y,idx)=>(
                <th key={y} colSpan={2} style={{padding:"8px 14px",textAlign:"center",color:idx===0?"#ffe88a":"#b8d4f8",fontWeight:700,background:idx===0?"#1e4a2c":"#1a3a5c",borderRight:"2px solid #2d5a8c",minWidth:200}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>

            </tr>
            <tr style={{background:"#f0f4f8",borderBottom:"2px solid #d0daea"}}>
              <th style={{position:"sticky",left:0,zIndex:4,padding:"7px 14px",background:"#f0f4f8",borderRight:"1px solid #d8e4f0"}}></th>
              <th style={{padding:"7px 10px",textAlign:"right",color:"#8e44ad",fontWeight:600,background:"#f8f0ff",fontSize:11,minWidth:80,borderRight:"1px solid #e0d0f0"}}>금액</th>
              <th style={{padding:"7px 10px",textAlign:"center",color:"#8e44ad",fontWeight:600,background:"#f8f0ff",fontSize:11,minWidth:100,borderRight:"2px solid #c8a8e0"}}>납부일</th>
              {yearOnlyKeys.map((y,idx)=>(
                <React.Fragment key={y}>
                  <th style={{padding:"7px 10px",textAlign:"right",color:idx===0?"#1a6b3c":"#555",fontWeight:600,background:idx===0?"#edfaf3":"#f8f9fa",fontSize:11,minWidth:90,borderRight:"1px solid #e0e8f0"}}>금액</th>
                  <th style={{padding:"7px 10px",textAlign:"center",color:idx===0?"#1a6b3c":"#555",fontWeight:600,background:idx===0?"#edfaf3":"#f8f9fa",fontSize:11,minWidth:110,borderRight:"2px solid #d0daea"}}>납부일</th>
                </React.Fragment>
              ))}
              <th style={{position:"sticky",right:60,zIndex:4,padding:"7px 10px",background:"#e8eef7"}}></th>
              <th style={{position:"sticky",right:0,zIndex:4,background:"#f0f4f8"}}></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((row,i)=>{
              const bg=i%2?"#fafafa":"#fff";
              const sub=yearOnlyKeys.reduce((s,y)=>s+(row[y]||0),0)+(row.entry||0);
              return(
                <tr key={row.memberId} style={{borderBottom:"1px solid #f0f0f0",background:bg}}>
                  <td style={{position:"sticky",left:0,zIndex:2,padding:"8px 14px",fontWeight:700,background:bg,borderRight:"1px solid #e8e8e8",fontSize:13}}>{row.name}</td>
                  <td style={{padding:"7px 10px",textAlign:"right",background:row.entry>0?"#fdf5ff":bg,borderRight:"1px solid #ede0f5",minWidth:80}}>
                    <span style={{color:row.entry>0?"#8e44ad":"#ddd",fontWeight:row.entry>0?700:400,fontSize:12}}>{row.entry>0?(row.entry).toLocaleString():"-"}</span>
                  </td>
                  <td style={{padding:"7px 8px",textAlign:"center",background:row.entry>0?"#fdf5ff":bg,borderRight:"2px solid #c8a0e0",minWidth:100}}>
                    <span style={{fontSize:11,color:row.entry_date?"#555":"#ddd"}}>{row.entry_date||"-"}</span>
                  </td>
                  {yearOnlyKeys.map((y,idx)=>(
                    <React.Fragment key={y}>
                      <td style={{padding:"7px 10px",textAlign:"right",background:row[y]>0&&idx===0?"#f0fdf5":bg,borderRight:"1px solid #eee",minWidth:90}}>
                        <span style={{color:row[y]>0?(idx===0?"#1a7a3c":"#27ae60"):"#ddd",fontWeight:row[y]>0?600:400,fontSize:12}}>{row[y]>0?(row[y]).toLocaleString():"미납"}</span>
                      </td>
                      <td style={{padding:"7px 8px",textAlign:"center",background:row[y]>0&&idx===0?"#f0fdf5":bg,borderRight:"2px solid #e0e8f0",minWidth:110}}>
                        <span style={{fontSize:11,color:row[y+"_date"]?"#555":"#ddd"}}>{row[y+"_date"]||"-"}</span>
                      </td>
                    </React.Fragment>
                  ))}
                  <td style={{position:"sticky",right:60,zIndex:2,padding:"8px 12px",textAlign:"right",fontWeight:700,color:"#2d6a9f",background:i%2?"#f2f6fc":"#f8faff",fontSize:13,boxShadow:"-2px 0 4px rgba(0,0,0,.06)"}}>{sub.toLocaleString()}</td>
                  <td style={{position:"sticky",right:0,zIndex:2,padding:"6px 8px",background:bg}}>
                    {isAdmin&&<button onClick={()=>openEdit(row)} style={{background:"#e8f0fe",color:"#2d6a9f",border:"none",borderRadius:5,padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>✏️ 수정</button>}
                  </td>
                </tr>
              );
            })}
            <tr style={{background:"#e8eef7",borderTop:"2px solid #b8cce8",fontWeight:700}}>
              <td style={{position:"sticky",left:0,zIndex:2,padding:"10px 14px",color:"#1a3a5c",background:"#e8eef7",fontSize:13}}>합계</td>
              <td style={{padding:"10px 10px",textAlign:"right",color:"#8e44ad",background:"#f0e8f8"}}>{entryTotal.toLocaleString()}</td>
              <td style={{padding:"10px 8px",background:"#f0e8f8",borderRight:"2px solid #c8a0e0"}}></td>
              {yearOnlyKeys.map((y,idx)=>(
                <React.Fragment key={y}>
                  <td style={{padding:"10px 10px",textAlign:"right",color:idx===0?"#1a7a3c":"#2d6a9f",fontWeight:700,background:idx===0?"#e0f8ea":"#e8eef7"}}>{(yearTotals[y]||0).toLocaleString()}</td>
                  <td style={{padding:"10px 8px",background:idx===0?"#e0f8ea":"#e8eef7",borderRight:"2px solid #d0daea"}}></td>
                </React.Fragment>
              ))}
              <td style={{position:"sticky",right:60,zIndex:2,padding:"10px 12px",textAlign:"right",color:"#1a3a5c",background:"#d8e5f5",fontSize:13,boxShadow:"-2px 0 4px rgba(0,0,0,.06)"}}>{grandTotal.toLocaleString()}</td>
              <td style={{position:"sticky",right:0,zIndex:2,background:"#e8eef7"}}></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── 통장내역 ──
function BankPage({transactions,setTransactions,isAdmin}) {
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({date:"",desc:"",amount:"",type:"income"});
  const [search,setSearch]=useState("");
  const [filterYear,setFilterYear]=useState("전체");
  const [filterMonth,setFilterMonth]=useState("전체");
  const [filterType,setFilterType]=useState("전체");
  const [viewMode,setViewMode]=useState("list");
  const [selectedYear,setSelectedYear]=useState("");
  const [expandedMonth,setExpandedMonth]=useState(null);
  const [editId,setEditId]=useState(null);
  const [editForm,setEditForm]=useState({});

  const balance=transactions.length?transactions[transactions.length-1].balance:0;
  const thisYear=new Date().getFullYear().toString();
  const thisYearTxs=transactions.filter(t=>t.date.startsWith(thisYear));
  const totalIncome=thisYearTxs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const totalExpense=thisYearTxs.filter(t=>t.type==="expense").reduce((s,t)=>s+Math.abs(t.amount),0);

  const years=useMemo(()=>[...new Set(transactions.map(t=>t.date.slice(0,4)))].sort().reverse(),[transactions]);
  const months=["01","02","03","04","05","06","07","08","09","10","11","12"];

  // 잔액 재계산 유틸
  const recalcBalances=(txList)=>{
    let bal=0;
    return txList.map(t=>{bal+=t.amount;return{...t,balance:bal};});
  };

  const addTx=()=>{
    if(!form.date||!form.desc||!form.amount){alert("날짜·내역·금액을 모두 입력해주세요.");return;}
    if(!setTransactions){alert("🔒 관리자만 입력할 수 있습니다.");return;}
    const amt=form.type==="income"?Math.abs(parseInt(form.amount)):-Math.abs(parseInt(form.amount));
    const sorted=[...transactions,{id:Date.now(),date:form.date,desc:form.desc,amount:amt,type:form.type,balance:0}]
      .sort((a,b)=>a.date.localeCompare(b.date));
    setTransactions(recalcBalances(sorted));
    setForm({date:"",desc:"",amount:"",type:"income"});
    setShowForm(false);
  };

  const saveEdit=()=>{
    if(!editForm.date||!editForm.desc||!editForm.amount)return;
    const amt=editForm.type==="income"?Math.abs(parseInt(editForm.amount)):-Math.abs(parseInt(editForm.amount));
    const updated=transactions.map(t=>t.id===editId?{...t,date:editForm.date,desc:editForm.desc,amount:amt,type:editForm.type}:t)
      .sort((a,b)=>a.date.localeCompare(b.date));
    setTransactions(recalcBalances(updated));
    setEditId(null);
  };

  const deleteTx=(id)=>{
    if(!window.confirm("이 내역을 삭제할까요?"))return;
    const updated=transactions.filter(t=>t.id!==id);
    setTransactions(recalcBalances(updated));
  };

  const yearlySummary=useMemo(()=>years.map(yr=>{
    const txs=transactions.filter(t=>t.date.startsWith(yr));
    const income=txs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
    const expense=txs.filter(t=>t.type==="expense").reduce((s,t)=>s+Math.abs(t.amount),0);
    return{year:yr,income,expense,net:income-expense,count:txs.length};
  }),[transactions,years]);

  const monthlySummary=useMemo(()=>{
    const yr=selectedYear||years[0]||"";
    return months.map(m=>{
      const txs=transactions.filter(t=>t.date.startsWith(yr+"-"+m));
      const income=txs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
      const expense=txs.filter(t=>t.type==="expense").reduce((s,t)=>s+Math.abs(t.amount),0);
      return{month:m,label:parseInt(m)+"월",income,expense,net:income-expense,count:txs.length,txs};
    }).filter(m=>m.count>0);
  },[transactions,selectedYear,years]);

  // 목록 뷰 필터 (연도·월·구분·키워드)
  const filtered=useMemo(()=>{
    return [...transactions].reverse().filter(t=>{
      const yr=t.date.slice(0,4); const mo=t.date.slice(5,7);
      return (filterYear==="전체"||yr===filterYear)&&
             (filterMonth==="전체"||mo===filterMonth)&&
             (filterType==="전체"||(filterType==="수입"&&t.type==="income")||(filterType==="지출"&&t.type==="expense"))&&
             (!search||t.desc.includes(search)||t.date.includes(search));
    });
  },[transactions,filterYear,filterMonth,filterType,search]);

  // 필터 적용된 수입/지출 합계
  const filteredIncome=filtered.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const filteredExpense=filtered.filter(t=>t.type==="expense").reduce((s,t)=>s+Math.abs(t.amount),0);

  const downloadBank=()=>{
    const yr=filterYear==="전체"?"전체":filterYear;
    const header=["날짜","내역","구분","금액","잔액"];
    const rows=filtered.map(t=>[t.date,t.desc,t.type==="income"?"수입":"지출",t.amount,t.balance]);
    const summary=[[""],["수입합계","","",(filteredIncome),""],["지출합계","","",(filteredExpense),""],["잔액","","",balance,""]];
    downloadExcel([{name:`통장내역_${yr}`,data:[header,...rows,...summary]}],`부여미협_수입지출내역_${yr}_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  const tabBtn=(mode,label)=>(
    <button onClick={()=>setViewMode(mode)} style={{padding:"7px 14px",border:"none",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:600,background:viewMode===mode?"#2d6a9f":"#f0f0f0",color:viewMode===mode?"#fff":"#666"}}>{label}</button>
  );

  const selStyle={border:"1px solid #e0e0e0",borderRadius:7,padding:"6px 10px",fontSize:12,background:"#fff",cursor:"pointer"};

  return (
    <div>
      {/* 헤더 */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <h2 style={{margin:0,fontSize:18,fontWeight:700}}>🏦 통장 수입·지출 내역</h2>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{display:"flex",gap:4,background:"#f0f0f0",borderRadius:8,padding:3}}>
            {tabBtn("list","📋 내역")} {tabBtn("yearly","📊 연도별")} {tabBtn("monthly","📅 월별")}
          </div>
          <ExcelBtn onClick={downloadBank} label="엑셀 다운로드"/>
          {isAdmin&&<button onClick={()=>setShowForm(!showForm)}
            style={{background:"#2d6a9f",color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontSize:13,fontWeight:600,whiteSpace:"nowrap"}}>
            {showForm?"✕ 닫기":"+ 내역 추가"}
          </button>}
        </div>
      </div>

      {/* 요약 카드 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:14}}>
        {[
          {label:"현재 잔액",value:won(balance),color:"#2d6a9f",bold:true},
          {label:thisYear+"년 수입",value:won(totalIncome),color:"#27ae60"},
          {label:thisYear+"년 지출",value:won(totalExpense),color:"#e74c3c"}
        ].map((c,i)=>(
          <div key={i} style={{background:i===0?"#f0f7ff":"#fff",borderRadius:10,padding:"14px 18px",boxShadow:i===0?"0 2px 8px rgba(45,106,159,.15)":"0 1px 4px rgba(0,0,0,.06)",textAlign:"center",border:i===0?"2px solid #2d6a9f":"none"}}>
            <div style={{fontSize:11,color:"#888"}}>{c.label}</div>
            <div style={{fontSize:i===0?22:18,fontWeight:700,color:c.color,marginTop:4}}>{c.value}</div>
          </div>
        ))}
      </div>

      {/* 내역 추가 모달 */}
      {showForm&&isAdmin&&(
        <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",background:"rgba(0,0,0,.5)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,boxSizing:"border-box"}}
          onClick={e=>{if(e.target===e.currentTarget){setShowForm(false);setForm({date:"",desc:"",amount:"",type:"income"});}}}>
          <div style={{background:"#fff",borderRadius:16,padding:24,width:"100%",maxWidth:420,boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <div style={{fontWeight:700,fontSize:16,color:"#2d6a9f"}}>🏦 내역 추가</div>
              <button onClick={()=>{setShowForm(false);setForm({date:"",desc:"",amount:"",type:"income"});}} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#aaa"}}>✕</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
              <div style={{gridColumn:"1/-1"}}>
                <label style={{fontSize:12,color:"#666",fontWeight:600,display:"block",marginBottom:4}}>날짜</label>
                <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}
                  style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:7,padding:"9px 12px",fontSize:14,boxSizing:"border-box"}}/>
              </div>
              <div style={{gridColumn:"1/-1"}}>
                <label style={{fontSize:12,color:"#666",fontWeight:600,display:"block",marginBottom:4}}>내역</label>
                <input value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))} placeholder="내역 입력"
                  style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:7,padding:"9px 12px",fontSize:14,boxSizing:"border-box"}}/>
              </div>
              <div>
                <label style={{fontSize:12,color:"#666",fontWeight:600,display:"block",marginBottom:4}}>금액 (원)</label>
                <input type="number" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} placeholder="0"
                  style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:7,padding:"9px 12px",fontSize:14,boxSizing:"border-box"}}/>
              </div>
              <div>
                <label style={{fontSize:12,color:"#666",fontWeight:600,display:"block",marginBottom:4}}>구분</label>
                <select value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}
                  style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:7,padding:"9px 12px",fontSize:14,boxSizing:"border-box"}}>
                  <option value="income">💚 수입</option>
                  <option value="expense">❤️ 지출</option>
                </select>
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:4}}>
              <button onClick={addTx} style={{flex:1,background:"linear-gradient(135deg,#2d6a9f,#4a90c4)",color:"#fff",border:"none",borderRadius:8,padding:"12px",cursor:"pointer",fontWeight:700,fontSize:14}}>➕ 추가</button>
              <button onClick={()=>{setShowForm(false);setForm({date:"",desc:"",amount:"",type:"income"});}} style={{background:"#f0f0f0",border:"none",borderRadius:8,padding:"12px 20px",cursor:"pointer",fontSize:13}}>취소</button>
            </div>
          </div>
        </div>
      )}

      {/* ── 내역 뷰 ── */}
      {viewMode==="list"&&(
        <div>
          {/* 필터바 */}
          <div style={{background:"#fff",borderRadius:10,padding:"12px 14px",marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,.06)",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 내역·날짜 검색"
              style={{...selStyle,minWidth:160,flex:1}}/>
            <select value={filterYear} onChange={e=>{setFilterYear(e.target.value);setFilterMonth("전체");}} style={selStyle}>
              <option>전체</option>{years.map(y=><option key={y}>{y}</option>)}
            </select>
            <select value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} style={selStyle} disabled={filterYear==="전체"}>
              <option>전체</option>{months.map(m=><option key={m} value={m}>{parseInt(m)}월</option>)}
            </select>
            <select value={filterType} onChange={e=>setFilterType(e.target.value)} style={selStyle}>
              <option>전체</option><option>수입</option><option>지출</option>
            </select>
            {(filterYear!=="전체"||filterMonth!=="전체"||filterType!=="전체"||search)&&(
              <button onClick={()=>{setFilterYear("전체");setFilterMonth("전체");setFilterType("전체");setSearch("");}}
                style={{background:"#fde8e8",color:"#c0392b",border:"none",borderRadius:6,padding:"6px 10px",cursor:"pointer",fontSize:12,fontWeight:600}}>
                ✕ 초기화
              </button>
            )}
            <span style={{fontSize:12,color:"#aaa",marginLeft:"auto"}}>
              {filtered.length}건 · 수입 <span style={{color:"#27ae60",fontWeight:600}}>{filteredIncome.toLocaleString()}</span> · 지출 <span style={{color:"#e74c3c",fontWeight:600}}>{filteredExpense.toLocaleString()}</span>
            </span>
          </div>

          <div style={{background:"#fff",borderRadius:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)",overflow:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:"#f8f9fa",borderBottom:"2px solid #e8e8e8"}}>
                {["날짜","내역","구분","금액","잔액",""].map((h,i)=>(
                  <th key={i} style={{padding:"10px 14px",textAlign:i>=3&&i<5?"right":"left",color:"#666",fontWeight:600,whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {filtered.length===0&&<tr><td colSpan={6} style={{textAlign:"center",padding:40,color:"#ccc"}}>검색 결과가 없습니다</td></tr>}
                {filtered.map((t,i)=>{
                  const isEdit=editId===t.id;
                  return(
                    <tr key={t.id} style={{borderBottom:"1px solid #f5f5f5",background:isEdit?"#f0f7ff":i%2?"#fafafa":"#fff"}}>
                      <td style={{padding:"8px 14px",color:"#888",whiteSpace:"nowrap"}}>
                        {isEdit
                          ?<input type="date" value={editForm.date} onChange={e=>setEditForm({...editForm,date:e.target.value})}
                              style={{border:"1px solid #2d6a9f",borderRadius:5,padding:"3px 6px",fontSize:12,width:130}}/>
                          :t.date}
                      </td>
                      <td style={{padding:"8px 14px"}}>
                        {isEdit
                          ?<input value={editForm.desc} onChange={e=>setEditForm({...editForm,desc:e.target.value})}
                              style={{width:"100%",border:"1px solid #2d6a9f",borderRadius:5,padding:"3px 6px",fontSize:12,boxSizing:"border-box",minWidth:160}}/>
                          :t.desc}
                      </td>
                      <td style={{padding:"8px 14px"}}>
                        {isEdit
                          ?<select value={editForm.type} onChange={e=>setEditForm({...editForm,type:e.target.value})}
                              style={{border:"1px solid #2d6a9f",borderRadius:5,padding:"3px 6px",fontSize:12}}>
                              <option value="income">수입</option><option value="expense">지출</option></select>
                          :<span style={{background:t.type==="income"?"#e8f5e9":"#fde8e8",color:t.type==="income"?"#27ae60":"#e74c3c",padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:600}}>
                            {t.type==="income"?"수입":"지출"}</span>}
                      </td>
                      <td style={{padding:"8px 14px",textAlign:"right",color:t.type==="income"?"#27ae60":"#e74c3c",fontWeight:600}}>
                        {isEdit
                          ?<input type="number" value={Math.abs(parseInt(editForm.amount)||0)} onChange={e=>setEditForm({...editForm,amount:e.target.value})}
                              style={{width:100,border:"1px solid #2d6a9f",borderRadius:5,padding:"3px 6px",textAlign:"right",fontSize:12}}/>
                          :<>{t.type==="income"?"+":"-"}{Math.abs(t.amount||0).toLocaleString()}</>}
                      </td>
                      <td style={{padding:"8px 14px",textAlign:"right",fontWeight:700,color:"#444"}}>{(t.balance||0).toLocaleString()}</td>
                      <td style={{padding:"8px 10px",whiteSpace:"nowrap"}}>
                        {isAdmin&&(isEdit
                          ?<><button onClick={saveEdit} style={{background:"#27ae60",color:"#fff",border:"none",borderRadius:5,padding:"3px 9px",cursor:"pointer",fontSize:11,fontWeight:600,marginRight:4}}>저장</button>
                             <button onClick={()=>setEditId(null)} style={{background:"#f0f0f0",border:"none",borderRadius:5,padding:"3px 8px",cursor:"pointer",fontSize:11}}>취소</button></>
                          :<><button onClick={()=>{setEditId(t.id);setEditForm({date:t.date,desc:t.desc,amount:Math.abs(t.amount),type:t.type});}}
                              style={{background:"#e8f0fe",color:"#2d6a9f",border:"none",borderRadius:5,padding:"3px 8px",cursor:"pointer",fontSize:11,marginRight:4}}>수정</button>
                             <button onClick={()=>deleteTx(t.id)} style={{background:"#fde8e8",color:"#c0392b",border:"none",borderRadius:5,padding:"3px 8px",cursor:"pointer",fontSize:11}}>삭제</button></>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── 연도별 뷰 ── */}
      {viewMode==="yearly"&&(
        <div>
          <div style={{background:"#fff",borderRadius:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)",overflow:"hidden",marginBottom:14}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:"#f8f9fa",borderBottom:"2px solid #e8e8e8"}}>
                {["연도","수입 합계","지출 합계","순수입","건수"].map((h,i)=>(
                  <th key={i} style={{padding:"12px 16px",textAlign:i===0?"left":"right",color:"#666",fontWeight:600}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {years.length===0&&<tr><td colSpan={5} style={{textAlign:"center",padding:30,color:"#ccc"}}>내역이 없습니다</td></tr>}
                {yearlySummary.map((y,i)=>(
                  <tr key={y.year} style={{borderBottom:"1px solid #f0f0f0",background:i%2?"#fafafa":"#fff",cursor:"pointer"}}
                    onClick={()=>{setSelectedYear(y.year);setExpandedMonth(null);setViewMode("monthly");}}>
                    <td style={{padding:"12px 16px",fontWeight:700,color:"#2d6a9f"}}>{y.year}년 →</td>
                    <td style={{padding:"12px 16px",textAlign:"right",color:"#27ae60",fontWeight:600}}>{y.income.toLocaleString()}</td>
                    <td style={{padding:"12px 16px",textAlign:"right",color:"#e74c3c",fontWeight:600}}>{y.expense.toLocaleString()}</td>
                    <td style={{padding:"12px 16px",textAlign:"right",fontWeight:700,color:y.net>=0?"#2d6a9f":"#e74c3c"}}>{y.net>=0?"+":""}{y.net.toLocaleString()}</td>
                    <td style={{padding:"12px 16px",textAlign:"right",color:"#888"}}>{y.count}건</td>
                  </tr>
                ))}
                {yearlySummary.length>0&&(
                  <tr style={{background:"#f0f4f8",borderTop:"2px solid #d0d9e8",fontWeight:700}}>
                    <td style={{padding:"12px 16px"}}>전체 합계</td>
                    <td style={{padding:"12px 16px",textAlign:"right",color:"#27ae60"}}>{yearlySummary.reduce((s,y)=>s+y.income,0).toLocaleString()}</td>
                    <td style={{padding:"12px 16px",textAlign:"right",color:"#e74c3c"}}>{yearlySummary.reduce((s,y)=>s+y.expense,0).toLocaleString()}</td>
                    <td style={{padding:"12px 16px",textAlign:"right",color:"#2d6a9f"}}>{yearlySummary.reduce((s,y)=>s+y.net,0).toLocaleString()}</td>
                    <td style={{padding:"12px 16px",textAlign:"right",color:"#888"}}>{yearlySummary.reduce((s,y)=>s+y.count,0)}건</td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
          {/* 막대 그래프 */}
          <div style={{background:"#fff",borderRadius:10,padding:20,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:14,color:"#333"}}>📊 연도별 수입·지출 비교</div>
            {yearlySummary.length===0&&<div style={{textAlign:"center",color:"#ccc",padding:20}}>데이터가 없습니다</div>}
            {[...yearlySummary].reverse().map(y=>{
              const max=Math.max(...yearlySummary.map(x=>Math.max(x.income,x.expense)),1);
              return(<div key={y.year} style={{marginBottom:16}}>
                <div style={{fontSize:12,fontWeight:700,marginBottom:6,color:"#555"}}>{y.year}년</div>
                {[["수입",y.income,"#27ae60"],["지출",y.expense,"#e74c3c"]].map(([l,v,c])=>(
                  <div key={l} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                    <span style={{fontSize:11,color:"#888",width:28,textAlign:"right",flexShrink:0}}>{l}</span>
                    <div style={{flex:1,background:"#f0f0f0",borderRadius:6,height:16,overflow:"hidden"}}>
                      <div style={{background:c,height:"100%",width:`${v/max*100}%`,borderRadius:6,transition:"width .3s"}}/>
                    </div>
                    <span style={{fontSize:11,color:c,fontWeight:600,minWidth:90,textAlign:"right",flexShrink:0}}>{v.toLocaleString()}원</span>
                  </div>
                ))}
              </div>);
            })}
          </div>
        </div>
      )}

      {/* ── 월별 뷰 ── */}
      {viewMode==="monthly"&&(
        <div>
          {/* 연도 선택 탭 */}
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,flexWrap:"wrap"}}>
            <span style={{fontSize:13,fontWeight:600,color:"#555"}}>연도 선택:</span>
            {years.map(yr=>(
              <button key={yr} onClick={()=>{setSelectedYear(yr);setExpandedMonth(null);}}
                style={{padding:"5px 16px",border:"none",borderRadius:20,cursor:"pointer",fontSize:13,fontWeight:600,
                  background:(selectedYear||years[0])===yr?"#2d6a9f":"#f0f0f0",
                  color:(selectedYear||years[0])===yr?"#fff":"#666"}}>
